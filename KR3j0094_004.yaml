body:
  text: 東坡志林卷四宋蘇軾撰天上失星崔浩乃云當出東井已而果然所謂億則屢中者耶漢十月五星聚東井金水嘗附日不逺而十月日在箕尾此浩所以疑其妄以余度之十月為正葢十月乃今之八月爾八月而得七月節則日猶在翼軫間則金水聚於井亦不甚逺方是時沛公未得天下甘石何意謟之浩之說未足信也楚孝王囂疾成帝詔云夫子所痛蔑之命矣夫東平王不得於太后元帝詔曰諸侯在位不驕然後富貴離其身而社稷可保皆與今論語孝經小異離附離也今作不離於身疑為俗儒所増也房次律敗於陳濤斜殺四萬人悲哉世之言兵者或取通典通典雖杜佑所集然其源出於劉秩陳濤之敗秩有力焉次律云曳洛河雖多安能當我劉秩挾區區之辯以待曳洛河踈矣先友史經臣字彦輔眉山人與先子同舉制册有名蜀中世所共知沆子疑者其弟也沆才氣絶人而薄於徳彥輔才不减沆而篤於節義博辯能屬文其思子臺賦最善大略言漢武晉惠天資相去絶逺至其惑則漢武與晉惠無異竟不仕年六十卒無子先君為治䘮立其同宗子為後今為農夫無聞於人沆亦無子哀哉史記司馬穰苴齊景公時人也其事至偉而左氏不載余嘗疑之戰國䇿云司馬穰苴為政者也閔王殺之大臣不親則其去景公也逺矣太史取戰國策而作史記當以戰國䇿為信凡史記所書大事而左氏無有者皆可疑如程嬰杵臼之類是也穰苴之書不可誣抑不在春秋之世矣當更徐考之司馬相如歸蜀臨卭令王吉謬為恭敬日徃朝相如相如稱病使者謝吉及卓氏為具相如又稱病不徃吉自往迎相如觀吉意欲與相如為率錢之㑹爾而相如遂竊妻以逃大可笑其諭蜀父老云以諷天子以今觀之不獨不能諷殆幾於勸矣謟諛之意死而不已猶作封禪書相如真所謂小人也哉晉士浮虛無實用然其間亦有不然者如孟嘉平生無一事然桓溫謂嘉曰人不可無勢我乃能駕馭卿溫平生輕殷浩豈妄許人者哉乃知孟嘉若遇當作謝安安不遇不過如孟嘉稷下之盛胎驪山之禍太學三萬人嘘枯吹生亦兆黨錮之寃今吾聞本秀二僧皆以口耳區區奔走王公洶洶都邑安得而不敗殆非浮屠氏之福也昔先友史經臣彥輔謂余阮籍登廣武而歎曰時無英雄使䜿子成其名豈謂沛公䜿子乎余曰非也傷時無劉項也䜿子指魏晉間人耳其後余逰潤州甘露寺有孔明孫權梁武李徳裕之遺迹余感之賦詩其略曰四雄皆龍虎遺迹儼未刓方其盛壯時爭奪肯少安廢興屬造物遷逝誰控摶况彼妄庸子而欲事所難聊興廣武嘆不待雍門彈則猶此意也今日讀李太白登廣武古戰塲詩云沈湎呼䜿子狂言非至公乃知太白亦誤認嗣宗語與先友之意無異也嗣宗雖放蕩本有志於世以魏晉間多故故一放於酒何至以沛公為䜿子乎真宗時或薦梅詢可用者上曰李沆嘗言其非君子時沆之没盖二十餘年矣歐陽文忠公嘗問蘇子容曰宰相没二十年能使人主追信其言以何道子容言獨以無心故耳某因贊其語且言陳執中俗吏耳特至公猶能取信主上况如李公之才識而濟之以無心耶元祐三年興龍節賜宴尚書省論此是日又見王鞏云其父仲儀言陳執中罷相仁宗問誰可代卿者執中舉吳育上即日召赴闕㑹乾元節侍宴偶醉坐睡忽驚顧拊床呼其從者上愕然即除西京留臺以此觀之執中雖俗吏亦可賢也育之不相命矣夫然晚節有心疾亦難大用仁宗非棄材之主也張舜民言永洛之役李舜舉徐禧李稷皆在圍中上以手詔賜西人若能保全吏士當盡復侵地詔未至而舜舉等已死聖主可謂重一士而輕千里矣惜此等不被其賜也哀哉哀哉舜舉中官也將死以敗紙半幅書其上云臣舜舉死無所恨但願陛下勿輕此賊付一健黠者間走以聞時李稷亦將死書紙後云臣稷千苦萬屈上為一慟然以見二人之賢不肖方李憲用事時士大夫或奴事之穆衍孫路至為執袍𢃄王中正盛時俞充至令妻執板而歌以侑中正飲若此類不可勝數而彭孫本以刼盗招出氣凌公卿韓持國至詣其第出妓飲酒酒酣慢持國持國不敢對然常為李憲濯足曰太尉足何其香也憲以足踏其頭曰奴謟我不太甚乎孫在許下造宅私招逃軍三百人役之予時将乞許覬至郡考其實斬訖乃奏㑹除潁州而止張舜民芸叟邠人也通練西事稍能詩從高遵裕西征中途作詩二絶一云靈州城下千株栁總被官軍砍作薪他日玉闗歸去路将何攀折贈行人一云青銅峽裏韋州路十去從軍九不囘白骨似沙沙似雪将軍莫上望鄉臺為轉運判官李密所奏得罪貶邠州監稅舜民言官軍圍靈武不下糧盡而返西人從城上問官軍漢人兀摖否或仰而答曰兀摖城上皆大笑西人謂慚為兀摖也天聖中曹瑋以節鎮定州王鬷為三司副使䟽決河北囚徒至定州瑋謂鬷曰君相甚貴當為樞密使然吾昔為秦州聞徳明歲使人以羊馬貨易於邊課所獲多少為賞罰時将以此殺人其子元昊年十三諫曰吾本以羊馬為國今反以資中原所得皆茶綵輕浮之物適足以驕惰吾民今又欲以此戮人茶綵日增羊馬日减吾國其削乎乃止不戮吾聞而異之使人圖其形信竒偉若徳明死此子必為中國患其當君之為樞密時乎盍自今學兵講邊事鬷雖受教盖亦未必信也其後鬷與張觀陳執中在樞府元昊反楊義上書論土兵事上問三人皆不知遂皆罷之鬷之孫為子由壻故知之元祐二年二月十七日見王伯虎炳之言昔為樞密院禮房檢詳文字見高麗公案始因張誠一使契丹於虜帳中見高麗人私語本國主向慕中國之意歸而奏之先帝始有招來之意樞密使李公弼因而迎合親書劄子乞招致遂命發運使崔極遣商人招之天下知非極而不知罪公弼如誠一盖不足道也前日見邸報范景仁乞上殿不知其何為也近得其姪伯禄書云景仁上殿為定大樂也景仁本以言新法不便致仕乃以功成治定自薦於樂則新法果便也揚子雲言齊魯有大臣史失其名叔孫通欲制君臣之儀徴先生於齊魯所不能致者二人以景仁觀之揚雄之言可謂謬矣今日見王鞏云張安道向渠説蘇子瞻比吾孔北海諸葛孔明孔明則吾豈敢北海或似之然不若融之蠢也吾謂北海以忠義氣節冠天下其勢足與曹操相軒輊决非兩立者北海以一死捍漢室所謂輕於鴻毛者何名為蠢哉孔道輔為御史中丞勘馮士元事盡法不阿仁宗稱之有意大用時大臣與士元通姦利最甚者宰相程琳道輔既得其情矣而退傅張士遜不喜道輔欲有以中之上使道輔送劄子中書士遜屏人與語乆之時臺官納劄子猶得於宰相公㕔後也因言公将大用道輔喜士遜曰公所以致此誰之力也非程公公不至此道輔悵然愧而徳之不数日上殿遂力救琳上大怒既貶琳亦黜道輔兖州道輔知為士遜所賣感憤得疾死中路元祐三年五月三日聞之蘇子容杜正獻公為相蔡君謨孫之翰為諫官屢乞出仁宗云卿等審欲得郡當具所欲乞奏來於是蔡除福州之翰安州正獻云諫官無故出終非美事乞且仍舊上可之退書聖語時陳恭公為執政不肯書曰吾初不聞正獻懼遂焚之由此遂罷相議者謂正獻當俟明日審奏不當遽焚其書也正獻言始在西府時上每訪以中書事及為相中書事不以訪公因言君臣之間能全始終者盖難也溫成皇后乳母賈氏宫中謂之賈婆婆賈昌朝連結之謂之姑姑臺諫論其姦吳春卿欲得其實而不可近侍有進對者曰近日臺諫言事虚實相半如賈姑姑事豈有是哉上黙然久之曰賈氏實曾薦昌朝非吾仁祖盛徳豈肯以實語臣下耶李士衡之父既以豪恣不法誅死士衡方進用王欽若欲言之而未有路㑹真宗論時文之弊因言路振文人也然不識禮法上曰何也曰李士衡父誅死而振為贈告曰世有顯人上頷之士衡以故不大用歐陽文忠公撰范文正神道碑載章獻太后臨朝時仁宗欲率百官朝太后范公力爭乃罷其後某先君奉詔太常因革禮求之故府而朝正案牘具在考其始末無諫止之事而有已行之明驗先君質之於文忠公公曰文正公寔諫而卒不從墓碑誤也當以案牘為正今日偶與客論此事夜歸乃記之吳元濟以蔡叛犯許汝以驚東都此豈可不討者也當時議者欲置之固為非策然不得武裴二傑事亦未易辦也白樂天豈庸人哉然其議論亦似欲置之者其詩有海圖屏風者可見其意且注云時方討淮蔡吾以是知仁人君子之於兵葢不忍輕用如此淮蔡且欲以徳懐况欲弊所持以勤無用乎悲夫此未易與世士談也王郎反河北獨鉅鹿信都為世祖堅守世祖既得二郡議者以為可因二郡兵自送還長安惟邳彤不可以為若行此策豈徒空河北必更驚動三輔公若無復征戰之意則雖信都之兵亦難㑹也何者公既西則邯鄲之兵不肯捐父母背城郭而千里送公其離散逃亡可必也世祖深感其言而止蘇子曰此東漢興亡之決邳彤可謂漢之元臣也景徳契丹之役羣臣皆欲避敵江南西蜀獨萊公不可武臣中獨髙瓊與萊公意同爾公既爭之力上曰卿文臣豈能盡用兵之利害公曰請召高瓊瓊至乃言避敵固為安全但恐扈駕之士路中逃亡無與俱西南者耳上乃大驚始決北征瓊之言大略似邳彤皆一代雄傑也齊高帝云吾當使金土同價意則善矣然物豈有此理哉孟子曰物之不齊物之情也巨屨小屨同價人豈為之哉而孟子亦自忘此言為菽粟如水火之論金之不可使賤如土猶土之不可使貴如金也堯之民比屋可封桀之民比屋可誅信此說則堯時諸侯滿天下桀時大辟徧四海也漢武帝無道無足觀者唯據厠見衛青不冠不見汲長孺為可佳耳若青奴才雅宜䑛痔據厠見之正其宜也儋耳進士黎子雲言城北十五里許有唐村庄民之老曰允從者年七十餘問子雲言宰相何苦以青苗久困我於官有益乎子雲言官患民貧富不均富者逐什一益富貧者取倍稱至鬻田質口不能償故為是法以均之允從笑曰貧富之不齊自古已然雖天公不能齊也子欲齊之乎民之有貧富由器用之有厚薄也子欲磨其厚等其薄厚者未動而薄者先穴矣元符三年二月二十一日子雲過予言此負薪能談王道正謂允從輩耶東坡志林卷四
