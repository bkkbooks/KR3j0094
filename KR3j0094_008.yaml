  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0094_WYG_008-1a, image: WYG0863/WYG0863-0070c.png}
body:
  text: 東坡志林卷八宋蘇軾撰樂事可慕苦事可畏此是未至時心耳及苦樂既至以身履之求畏慕者初不可得况既過之後復有何物比之尋聲捕影繫風趂夢此四者猶有倣佛也如此推究不免是病且以此病對治彼病彼此相磨安得樂處當以至理語君今則不可元祐三年八月五日書豫少不喜殺生時未能斷也近年始能不殺豬羊然性嗜蟹蛤故不免殺自去年得罪下獄始意不免既而得脫遂自此不復殺一物有見餉蟹蛤者皆放之江中雖知蛤在江中無活理然猶庶幾萬一便使不活亦愈於煎烹也非有所求覬但以親經患難不異雞鴨之在庖厨不復以口腹之故使有生之類受無量怖苦爾猶恨未能忘味食自死物也南史隱逸傳始興人盧度字彥章有道術少隨張永北伐魏永敗魏人追急淮水不得過自祝云若得免死從今不復殺生須臾見兩楯流來接之得過後隱居廬陵西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝壞我壁鹿應聲去屋前有池養魚皆名呼之次第取食逆知死年月竟以壽終偶讀此書與豫事粗相類故并録之豫在黃州與陳慥季常往來每往過之輒作泣字韻詩一篇季常不禁殺故以此風之季常既不復殺而里中皆化之至有不食肉者皆云未死神已泣此語使人悽然也吾有詩云日日出東門步尋東城遊城門抱關卒怪我此何求我亦無所求駕言寫我憂章子厚謂參寥曰前步而後駕何其上下紛紛也僕聞之曰吾以尻為輪以神為馬何曾上下乎參寥曰子瞻文過有理似孫子荆子荆曰所以枕流欲洗其耳吾酒後乘興作數十字覺酒氣拂拂從十指上出去也晉史董京字威輦作詩答孫子荆其略曰玄鳥汚幕而不被害鳥隼逺舉或以致死眄彼梁魚逡巡倒尾沉吟不快忽焉失水嗟乎魚鳥與萬世而不悟以我觀之乃明其故焉知不有達人深穆其度亦將窺我嚬蹙而去京之意蓋曰以魚自觀萬物不悟其非也我所以知魚鳥之為非者以我不與魚鳥同欲惡也彼達人者不與我同欲惡則其觀我之所為亦如我之觀魚鳥矣京得道異人也世俗不曉其語故粗為説之戊寅八月八日讀隱逸傳嶺南天氣卑陋氣蒸溽而海南尤甚秋夏之交物無不腐壞者人非金石其何以能久然儋耳頗有老人百有餘歲者往往皆是八九十歲者不論也乃知壽夭無定習而安之則氷蠶火鼠皆可以生吾當湛然無思寓此覺於物表使折膠之寒無所施其洌流金之暑無所措其毒百餘歲何足道哉彼愚老人初不知此特如蠶鼠生於其中兀然受之而已一呼之溫一吸之涼相續亡有間斷雖長生可也莊子曰天之穿之日夜無間人則固塞其竇豈不然哉九月二十七日秋霖不已顧視幃帳間有螻蟻帳已腐爛感嘆不已信手書此時戊寅歲也東坡居士遷於海南憂患之餘戊寅九月晦遊天慶觀謁北極真聖探靈簽以決餘生之禍福吉凶其辭曰道以信為合法以智為先二者不離析壽命乃得延覽之竦然若有所得謹書藏之以無忘信道法智二者不相離之意某恭書古之真人未有不以信人者子思則曰自誠明謂之性孟子曰執中無權猶執一也法而不智則天下之死法也道不患不知患不凝法不患不立患不活以信合道則道凝以智先法則法活道凝而法活雖度世可也况延壽乎世之所謂君子者惟法是修惟禮是克手執圭壁足履繩墨行願為目前檢言願為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見羣虱之處裩中乎遊乎深縫匿乎敗絮自以為吉宅也行不敢離縫際動不敢出裩襠自以為得繩墨也然炎丘火流焦邑滅都羣虱之處於襠中不能出也君子之處域內何異夫虱之處裩中乎此阮籍之懷本趣也籍未嘗臧否人物口不及世事然禮法之士疾之如讐獨賴司馬景王保持之耳其去死無幾以此論之亦虱之出入往來於衣巾之間者也安得裩中之藏乎吾故書之為將來君子一笑近世筆工不能經師匠妄生新意擇毫雖精形製詭異不與人手相謀獨錢塘程奕所製有三十年前意味使人作字不知有筆亦是一快豫不久行當致數百枚而去北方無此筆也豫來汝南地平無山清潁之外無以娛豫者而地近亳坡特宜檜柏自拱把而上輒有樛枝古幹治事堂二柏與薦福兩檜尤為殊絶孰為使豫安此寂寞而忘歸者非此君也歟道士某人靣欺主人旁若鄰座厠左元放之席已自厚顏傾西王母之杯宜從薄罰可罰一大青盞豫作蜜酒格與真水亂每米一斗用蒸餅麵二兩半餅子一兩半如常法取醅液再入蒸餅麵一兩釀之三日嘗看味當極辣且硬則以一斗米炊飯投之若甜軟則每投更入麴與餅各半兩又三日再投而熟全在釀者斟酌增損也入水少為佳僧謂酒為般若湯謂魚為水梭花雞為鑽籬菜竟無所益但欺而已世常有之人有為不義而文之以美名者與此何異哉貴公子雪中飲醉臨檻向風曰爽哉左右有泣下者公子驚問之曰吾父昔日以爽亡楚襄王登臺有風颯然而至王曰快哉此風寡人與庶人共之者耶宋玉譏之此獨大王之風庶人安得而共之不知者以為諂也知之者以為風也唐文宗詩曰人皆苦炎熱我愛夏日長柳公權續之曰薰風自南來殿閣生微涼惜乎宋玉不在傍也爛蒸同州羔灌以杏酪食之以匕不以筯南都撥心麵作槐芽溫淘糝以襄邑抹豬炊共城香稻薦以蒸子鵝吳興庖人斫松江鱸鱠繼以廬山康王谷水烹曾坑鬬品少焉解衣仰卧使人誦東坡赤壁前後賦亦足以一快也侯鯖集同青天素月固是人間一快而或者乃云不如微雲點綴乃知居心不淨者常欲滓穢太清合江樓下秋碧浮空光搖几席之上而有茅苫廬屋七八間橫斜砌下今歲大水再至居人散避不暇豈無寸土可遷而乃眷眷不去常為人眼中沙乎高祖微時嘗避事時時與賔客過其丘嫂食嫂厭叔與客來陽為羮盡轑釡客以故去已而視其釜中有羮由是怨嫂及立齊代王而伯子獨不侯太上皇以為言高祖曰非敢忘之也為其母不長者封其子信為頡羮侯高祖號為大度不記人過者然不置轑釜之怨獨不畏太上皇緣此記分杯之語乎楚元王敬禮穆生每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠楚人將鉗我於市稱疾卧申公與白生強起之曰獨不念先王之德乎今王一旦失小禮何足至此穆生曰君子見幾而作不俟終日先王所以禮吾三人者為道之存故也今而忽之是忘道也亡道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴與吳通謀二人諫不聽衣之赭衣使杵臼舂於市申公愧之歸魯教授不出門已而趙綰王臧言於武帝復以安車蒲輪召卒生臧事病死免穆生逺引於未萌之前而申公眷戀於既悔之後謂禍福皆天不可避就者未必然也可書之座右為士君子終身之戒吾嘗疑米元章用筆妙一時而所藏書真偽相半元祐四年六月十二日與章致平同過元章致平謂吾公嘗見親發鎖兩手捉書去人丈餘近輒掣去者乎元章笑遂出二王長史懷素輩十許帖子然後知平時所出皆苟以適衆目而已吾昔謫黃州曾子固居憂臨川死焉人有妄傳吾與子固同日化去且云如李長吉時事以上帝召他時先帝亦聞其語以問蜀人蒲宗孟且有歎息語今謫海南又有傳吾得道乘小舟入海不復返者京師皆云兒子書來言之今日有從黃州來者云太守何述言吾在儋耳一日忽失所在獨道服在耳蓋上賔也吾平生遭口語無數蓋生時與韓退之相似吾命在斗間而退之身宫在焉故其詩曰我生之辰月宿直斗且曰無善聲以聞無惡聲以揚今謗吾者或云死或云仙退之之言良非虛耳唐末五代文章藻麗字畫隨之而楊公凝式筆迹獨雄強往往與顔柳相上下甚可怪也今世多稱李建中宋宣獻此二人書僕所不要宋寒而李俗殆是浪得名惟近日蔡君謨天資既高學識亦至當為本朝第一荼䕷花似通草花桃花似臘花杏花似絹花罌粟花似紙花三月十一日會王文甫宗衆議評花如此吕稚卿言芍藥不及牡丹者以重耳戴芍藥一枝比牡丹三四花間猶當著數品蓋有其地而無其花譬如荔子之與溫柑也耶東漢肅宗時榖貴經用不足尚書張林請以布帛為租官自煮鹽且行均輸獨朱暉又季以為不可事既寢而陳事者復以為可行帝頗然之暉獨奏曰王制天子不言有無諸侯不言多少食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人宿怨布帛為租吏當姦盜皆非明王所當行帝方以林言為然發怒切責諸尚書暉等皆自繫獄三日詔出曰國家樂聞駁議黃髮無愆詔書過也何故自繫暉因稱病篤尚書令以下惶怖謂曰今得譴奈何稱病其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順於雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事即同暉起居太醫視疾太官賜食暉乃起元祐七年七月二十日偶讀後漢朱文季傳感嘆不已肅宗號稱長者詔書既引罪而謝文季矣諸尚書何怖之甚也文季於此強立不足多貴而諸尚書為可笑也云其禍不細不知何等為禍蓋以帝不悅後必不甚進用為莫大之禍也悲夫己卯上元豫在儋耳有老書生數人來過曰良月佳夜先生能一出乎豫欣然從之步城西入僧舍歷小巷民夷雜揉屠酤紛然歸舍已三鼓矣舍中掩關熟寢已再鼾矣放杖而笑孰為得失問先生何笑蓋自笑也然亦笑韓退之釣魚無得更欲逺去不知釣者未必得大魚也東坡志林卷八
