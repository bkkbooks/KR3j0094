body:
  text: 東坡志林卷六宋蘇軾撰黄州岐亭有王翊者家富而好善夢於水邉見一人為人所毆傷幾死見翊而號翊救之得免明日偶至水邉見一鹿為獵人所得已中幾鎗翊感悟以數千贖之鹿隨翊起居未嘗一歩捨翊又翊所居後有茂林果木一日有村婦林中見一桃過熟而絶大獨在木杪乃取而食之翊適見大驚婦人食已棄其核翊取而剖之得雄黄一塊如桃仁乃取而吞之甚甘美自是㫁葷肉齋居一食不復殺生亦可謂異事也杜叔元字君懿為人文雅學李建中書作詩亦有可觀蓄一硯云家世相傳是許敬宗硯始亦不甚信之其後官於杭州漁人於浙江中網得一銅匣其中有鑄成許敬宗字硯有兩足正方而匣亦有容足處不差毫毛始知是真敬宗物君懿與吾先君善先君欲求其硯而不可君懿既死其子沂以硯遺余求作墓銘余平生不作此文乃歸其硯不為作沂乃以遺孫覺莘老而得志文余過高郵莘老出硯示余曰敬宗在正好棒殺何以其硯為余以為憎而知其善雖其人且不可廢况其硯乎乃問莘老求而得硯端溪紫石也而滑潤如玉殺墨如風其磨墨處微窪真四百餘年物也匣今在唐諲處終當合之昨日夢有人告我云知其饗佛壽識妄吃天厨予甚領其意或曰真即享佛壽不妄吃天厨予曰真即是佛不妄即是天何但享而吃之乎其人甚可予言今年三月有書吏陳昱者暴死三日而蘇云初見壁有孔有人自孔擲一物至地化為人乃其亡姊也攜其手自孔出曰㝠吏追汝使我先見吏在旁昏黑如夜極望有明處空有橋榜曰㑹明人皆用泥錢橋極高有行橋上者姊曰此生天也昱行橋下然猶有在下者或為鳥鵲所啅曰此網捕者也又見一橋曰陽明人皆用紙錢有吏曹十餘人以狀闕者吏輙刻除之如抽貫然已而見㝠官則陳襄述古也問昱何故殺乳母昱曰無之呼乳母至血被面抱嬰兒熟視昱曰非此人也乃門下吏陳周官遂放昱還曰路逺當給竹馬又使諸曹檢已籍示之年六十九官左班殿直曰以平生不燒香故不甚壽又曰吾輩更此一報即不同矣意謂當超也昱還道見追陳周徃既蘇周果死鵞能警盗錢塘人喜殺日屠百鵞而鬻之市余自湖上夜歸過屠者之門羣鵝皆號聲震衢路若有訴者余悽然欲贖其死念終無所置之故不果然至今徃來予心也鵞不獨能警盗亦能却虵其糞葢殺虵蜀人園池養鵞虵即逺去有此二能而不能免死且又有祈雨之厄悲夫安得人人如逸少乎吾昔求地蘄水田在山谷間投種一斗得稻十斛問其故云連山皆野草散水不生五榖地氣不耗故發如此吾以是知五榖耗地氣為最甚也王莽末天下旱蝗黄金一斤易粟一斛至建武二年野榖旅生麻菽尤盛野蠶成繭被於山澤人收其利歲以為常至五年榖漸少而農事益修葢久不生榖地氣無所耗蘊蓄自發而為野蠶旅榖其理明甚庚辰正月六日讀世祖本紀書其事以為衛生之方地不生草木者多產金錫珠貝亦此理也水族癡暗太輕殺之或云不能償寃是乃欺善怕惡殺之其不仁甚於殺能償寃者李公擇嘗謂金雞有無雄而卵者抱之雖能破殻而出然不數日輒死此卵可食非殺之也余曰不然凡能動者皆佛子也竹蝨初如塗粉竹葉上爾然久乃能動者百千為曹無非佛子者梁武水陸畫像有六道外者以淡墨作人畜禽獸等形罔罔然於空中也乃是佛子流浪陋劣之極至於濕生如竹蝨者尤不可得但若存若亡於㝠漠間爾而謂水族雞卵可殺乎但吾起一殺念則地獄已具不在其能訴不能訴也吾久戒殺到惠州忽破戒數食蛤蟹然自今日懺悔復修前戒今日從者買一鯉長尺有咫雖困尚能微動乃置水瓮中須其死而食生即赦之聊記其事以為一笑脉之難明古今所病也至虗有盛候而大實有羸狀差之毫釐疑似之間便有死生禍福之異此古今所病也病不可不謁醫而醫之明脉者天下葢一二數騏驥不時有天下未嘗徒行和扁不世出病者未嘗徒死亦因其長而䕶其短爾士大夫多秘所患以求診以驗醫之能否使索病於㝠漠之中辨虛實冷熱於疑似之間醫不幸而失終不肯自謂失也則巧飾遂非以全其名至於不救則曰是固難治也間有謹愿者雖或因主人之言亦復叅以所見兩存而雜治以故藥不效此世之通患而莫之悟也吾生平求醫葢於平時黙驗其工拙至於有疾而求療必先盡告以所患而後求診使醫了然知患之所在也然後求之診虛實冷熱先定於中則脉之疑似不能惑也故雖中醫治吾疾常愈吾求疾愈而已豈以困醫為事哉爾朱道士晚客於眉山故蜀人多記其事自言受記於師云汝後遇白石浮當飛仙去爾朱雖以此語人亦莫識所謂後去眉山乃客於涪州愛其所產丹砂雖𤨏細而皆矢鏃狀瑩徹不雜土石遂止鍊丹數年竟於涪之白石仙去乃知師所言不謬者聞長老道其事甚多然不記其名字可恨也本草言丹砂出符陵谷陶隠居云符陵是涪州今無復採者吾聞熟於涪者云採藥者時復有之但時方貴辰錦砂故此不甚採爾讀本草偶記之吾故人黎錞字希聲治春秋有家法歐陽文忠公喜之然為人質木遲緩劉貢父戲之為黎􅰧子以謂指其徳不知果木中真有是也一日聨騎出聞市人有唱是果鬻之者大笑幾落馬今吾謫海南所居有此霜實纍纍然二君皆已登鬼録坐念故友之風味豈復可見劉固不泯於世者黎亦能文守道不茍隨者也幸思順金陵老儒也皇祐中沽酒江州人無賢愚皆喜之時刼江賊方熾有一官人艤舟酒壚下偶與思順徃來相喜思順以酒十壺餉之已而被刼於蘄黄間羣盗飲此酒驚曰此幸秀才酒耶官人識其意即紿曰僕與幸秀才親舊賊相顧嘆曰吾儕何為刼幸老所親哉歛所刼還之且戒曰見幸慎勿言思順年七十一日行二百里盛夏曝日中不渴葢常啖物而不飲水云戊寅十一月余在儋耳聞城西民李氏處子病卒兩日復生余與進士何旻同徃見其父問死生狀云初昏若有人引去至官府簾下有言此誤追庭下一吏云可且寄禁又一吏云此無罪當放還見獄在地窟中隧而出入繫者皆儋人僧居十六七有一嫗身皆黄毛如驢馬械而坐處子識之葢儋僧之室也曰吾坐用檀越錢物已三易毛矣又一僧亦處子鄰里死已二年矣其家方大祥有人持盤飱及錢數千云付某僧僧得錢分數百遺門者及持飯入門去繫者皆爭取其飯僧飯所食無幾又一僧至見者擎跪作禮僧曰此女可差人速送還送者以手擘墻壁使過復見一河有舟使登之送者以手推舟舟躍處子驚而寤是僧豈所謂地藏菩薩耶書此為世戒吾八歲入小學以道士張易簡為師童子幾百人師獨稱吾與陳太初者太初眉山市井人也余稍長之學日益遂第進士制策而太初乃為郡小吏其後予謫居黄州有眉山道士陸惟忠自蜀來云太初已尸解矣蜀人吳師道為漢州太守太初徃客焉正歲旦見師道求衣食錢物且告别持所得盡與市人貧者反坐於㦸門下遂寂師道使卒舁徃野外焚之卒罵曰何物道士使我正旦舁死人太初微笑開目曰不復煩汝歩自㦸門至金鴈橋下趺坐而逝焚之舉城人見煙熖上眇眇焉有一陳道人也吾嘗在湖北見農夫用秧馬行泥中極便頃來江西作秧馬歌以教人罕有從者近讀唐書回鶻部族黠戛斯傳云其人以竹馬行水上以板薦之以曲木支腋下一蹴輒百餘歩意殆與秧馬類歟聊復記之異日詳問其狀以告江南人也蜀去海遠取鹽於井陵州井最古淯井富順鹽亦久矣惟卭州蒲江縣井乃祥符中民王鸞所開利入至厚自慶厯皇祐以來蜀始用筒井用圜刅鑿如碗大深者數十丈以巨竹去節牝牡相銜為井以隔横入淡水則醎泉自上又以竹之差小者出入井中為桶無底而竅其上懸熟皮數寸出入水中氣自呼吸而啓閉之一筒致水數斗凡筒井皆用機械利之所在人無不知後漢書有水鞴此法唯蜀中鐡冶用之大略似鹽井取水筒太子賢不識妄以意觧非也丙子寒食日前寳積長老曇顥言惠州海澄十五指揮使姚歡守把阜民監熈寜中趙庶明知州廵檢姓申者與知監俞懿有隙吏士與監卒忿爭遂告監卒反庶明為閉衙門出甲付廵檢任討之歡執挺立監門白廵檢以身任監卒不反乞不交鋒廵檢無以奪為歛兵而止是日㣲歡惠州幾殆歡今年八十餘以安南軍功遷雄略指揮使老於黄州鬚髪不白自言年六十歲患癬疥周匝頂踵或教服黄連遂愈久服故髪不白其法以黄連去鬚酒浸一宿焙乾為末蜜圓如梧桐子大空心日午臨卧酒吞二十粒王彭嘗云塗巷中小兒薄劣其家所厭苦輒與錢令聚坐聼説古話至說三國事聞劉𤣥徳敗頻眉蹙有出涕者聞曹操敗即喜唱快以是知君子小人之澤百世不斬彭愷之子辜二吏頗知文章余嘗為作哀辭字大年蘇子得廢園於東坡之脅築而垣之作堂焉其正曰雪堂堂以大雪中為因繪雪於四壁之間無容隙也起居偃仰環顧睥睨無非雪者蘇子居之真得其所居者也蘇子隠几而晝瞑栩栩然若有所適而方興也未覺為物觸而寤其適未厭也若有失焉以掌抵目以足就履曳於堂下客有至而問者曰子世之散人耶拘人耶散人也而未能拘人也而嗜慾深今似繫馬止也有得乎有失乎蘇子之心若省而口未嘗言徐思其應揖而進之堂上客曰噫是矣子欲為散人而未得者也予今告子以散人之道夫禹之行水庖丁之提刀避衆礙而散其智者也是故以至柔馳至剛故石有時而泐以至剛遇至柔故未嘗見全牛也子能散也物固不能縛不能散也物固不能釋子有恵矣用之於内可也今也如蝟之在囊而時動其脊脅見於外者不特一毛二毛而已風不可搏影不可捕童子知之名之於人猶風之與影也子獨留之故愚者視而驚智者起而軋吾固怪子為今日之晚也子之遇我幸矣吾今要子為藩外之遊可乎蘇子曰予之於此自以為藩外久矣子又將安之乎客曰甚矣子之難曉也夫勢利不足以為藩也名譽不足以為藩也隂陽不足以為藩也人道不足以為藩也所以藩子者特智也爾智存諸内發而為言則言有謂也形而為行則行有謂也使子欲嘿不欲嘿欲息不欲息如醉者之恚言如狂者之妄行雖掩其口執其臂猶且喑嗚跼蹙之不已則藩之於人抑又固矣人之為患以有身身之為患以有心是圃之構堂將以佚子之身也是堂之繪雪將以佚子之心也身待堂而安則形固不能釋心以雪而警則神固不能凝子之和既焚而燼矣燼又復然則是堂之作也非徒無益而又重子蔽蒙也子見雪之白乎則恍然而目眩子知雪之寒乎則悚然而毛起五官之為害惟目為甚故至人不為雪乎雪乎吾見子知為目也子其殆矣客又舉杖而指諸壁曰此凹也此凸也方雪之雜下也均矣厲風過焉則凹者留而凸者散天豈私於凹凸哉勢使然也勢之所在天且不能違而况於人乎子之居此雖逺人也而圃有是堂堂有是名實礙人耳不猶雪之在凹者乎蘇子曰予之此為適然而已豈有心哉殆也奈何客曰子之適然也適有雨則將繪以雨乎適有風則将繪以風乎雨不可繪也觀雲氣之洶湧則使子有怒心風不可繪也見草木之披靡則使子有懼意覩是雪也子之内亦不能無動矣茍有動焉丹青之有靡麗氷雪之有水石一也徳有心心有眼物之所襲豈有異哉蘇子曰子之所言是也敢不聞命然未盡也予不能黙此正如與人訟者其理雖已屈猶未能絶辭者也子以為登春臺與入雪堂有以異乎以雪觀春則雪為靜以臺觀堂則堂為靜靜則得動則失黄帝古之神也遊乎赤水之北登乎崑崙之丘南望而還遺其𤣥珠焉遊以適意也望以寓情也意適於遊情寓於望則意暢情出而忘其本矣雖有良貴豈得而寳哉是以不免有遺珠之失也雖然意不久留情不再至必復其初而已矣是又驚其遺而索之也余之此堂追其逺者近之收其近者内之求之眉睫之間是有八荒之趣人而有知也升是堂者將見其不遡而僾不寒而栗凄凛其肌膚洗滌其煩鬱既無炙手之譏又免飲氷之疾彼其趦趄利害之徒猖狂憂患之域者何異探湯執熱之俟濯乎子之所言者上也余之所言者下也我將能為子之所為而子不能為我之為矣譬之厭膏粱者與之糟糠則必有忿詞衣文被繡者與之以皮弁則必有愧色子之於道膏粱文繡之謂也得其上者耳我以子為師子以我為資猶人之於衣食闕一不可將其與子游今日之事姑置之以待後論予且為子作歌以道之歌曰雪堂之前後兮春草齊雪堂之左右兮斜徑微雪堂之上兮有碩人之頎頎考槃於此兮芒鞋而葛衣挹清泉兮抱瓮而忘其機負頃筐兮行歌而采薇吾不知五十九年之非而今日之是又不知五十九年之是而今日之非吾不知天地之大也寒暑之變悟昔日之癯而今日之肥感子之言兮始也抑吾之縱而鞭吾之口終也釋吾之縛而脫吾之鞿是堂之作也吾非取雪之勢而取雪之意吾非逃世之事而逃世之機吾不知雪之為可觀賞吾不知世之為可依違性之便意之適不在於他在於羣息已動大明既升吾方輾轉一觀曉隙之塵飛子不棄兮我其子歸客欣然而笑唯然而出蘇子隨之客顧而頷之曰有若人哉東坡居士移守文登五日而去官眷戀山海之勝與同僚飲酒日賓樓上酒酣作此木石一紙投筆而歎自謂此來之絶河内史全叔取而藏之子開將徃河北相度河寜以冬至前一日被㫖過節遂行僕以節日來賀且别之留飲數盞頽然徑醉按上有此佳紙故為作草露書數紙遲其北還則又春矣當為我置酒蟹山藥桃李是時當復從公飲也昔年過洛見李公簡言真宗既東封訪天下隠者得把人楊朴能為詩召對自言不能上問臨行有人作詩送卿否朴曰唯臣妻有一首云更休落魄躭盃酒且莫猖狂愛詠詩今日捉將官裏去這回㫁送老頭皮上大笑放還山余在湖州坐作詩追赴詔獄妻子送余出門皆哭無以語之顧謂妻曰獨不能如楊處士妻作一詩送我乎妻子不覺失笑余乃出東坡志林卷六
