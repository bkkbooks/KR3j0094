  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0094_WYG_012-1a, image: WYG0863/WYG0863-0094c.png}
body:
  text: 東坡志林卷十二宋蘇軾撰羅浮道士何宗一以其猶子為童子狀貌肥黑矮小予嘗戲之曰此羅浮茯苓精也俗諺曰下有茯苓上生兎絲因名之曰苓之字表絲且祝老何善待之壯長非庸物也桃符仰視艾人而罵曰汝何等草芥輒居我上艾人俯而應曰汝已半截入土猶爭髙下乎桃符怒徃復紛然不已門神解之曰吾輩不肖方傍人門户何暇爭閒氣耶請妙總大士著此一轉語王燾集外臺秘要有代茶飲子一首云格韻髙絶惟山居逸人乃當作之予嘗依法治服其利鬲調中信如所云而其氣味乃一服煮散耳與茶了無干渉薛能詩云麄官乞與真抛却頼有詩情合得嘗又作鳥嘴茶詩云鹽損添嘗戒薑宜煮更誇乃知唐人之於茶葢有河朔脂麻氣也陸道士惟忠字子厚眉山人好丹藥通術數能詩蕭然有出塵之姿久客江南無知之者予昔在齊安葢相從㳺因是謁子由髙安子由大賞其詩㑹吳遠之過彼遂與俱來惠州出此詩晉方技傳有韋虛者父母使守稻牛食之虛見而不驅牛去乃理其殘亂者父母怒之虚曰物各飲食牛方食奈何驅之父母愈怒曰即如此何用理亂者為虚曰此稻又欲得生此言有理虚固有道者耶吕猗母足得痿痺病十餘年虛療之去母數歩坐瞑目寂然有頃曰扶起夫人坐猗曰夫人得疾十年豈可倉卒令起耶虛曰且試扶起兩人夾持而立少頃去夾者遂能行學道養炁者至足之餘能以氣與人都下道士李若之能之謂之布氣吾中子迨少羸多疾若之相對坐為布氣迨覺腹中如初日所照溫溫也葢若之曾遇得道異人於華岳下云古人有言有若無實若虛况汝實無而虛者耶使人謂汝庸人實無所能聞於吾者乃吾之望也慎言語節飲食晏寢早起務勞其形骸為善也臨别以是告汝四月十五日李獻之遺予天台玉版殆過澄心堂頃所未見月石屏捫之曰微凸乃偽也真者必平然多不圓圓而平桂滿而不出者此至難得可寳樂天作廬山草堂葢亦燒丹也欲成而爐鼎敗來日忠州刺史除書到乃知世間出世間事不兩立也僕有此志久矣而終無成者亦以世間事未敗故也今日真敗矣書曰民之所欲天必從之信而有徴文甫好典買古書竒物今日自言已典兩端硯及陳歸聖篆字用錢五千攀歸聖例每日持一兩紙只典三百文文甫言甚幸川僧悟清在傍知狀王十六秀才好蓄予書相從三十年得兩牛腰既入太學重不可致乃留文甫許分遺然緘鎻牢甚文甫云相與有瓜葛那得爾耶諸葛亮造八陣圖於魚腹平沙之上疊石為八行相去二丈桓溫征譙縱見之曰此常山蛇勢也文武皆莫識吾嘗過之自山上俯視百餘丈凡八行為六十四蕝蕝正圜不見凹凸處如日中葢影予就視皆卵石漫漫不可辨甚可恠也王濟以人乳蒸豚王愷使妓吹􅅇小失聲韻便殺之使美人行酒客飲不盡亦殺之時武帝在也而貴戚敢如此知晉室之亂也久矣到杭一遊龍井謁辨才遺像仍持宻雲團為獻龍井孤山下有石室前有六一泉白而甘當徃一酌湖上壽星院竹極偉其傍智果院有參寥泉及新泉皆甘冷異常當時徃一酌仍尋參寥子妙總師之遺迹見頴沙彌亦當致意靈隠寺後髙峰塔一上五里上有僧不下三十餘年矣不知今在否亦可一徃老杜云張公一生江海客身長九尺鬚眉蒼謂張鎬也賀下不賀上此天下通語士人歴官一任得外無官謗中無所愧於心釋肩而去如大熱遠行雖未到家得清凉館舎一解衣潄濯已足樂矣况於致仕而歸脫冠佩訪林泉顧平生一無可恨者其樂豈可勝言哉予出入文忠公門最久故見其欲釋位歸田可謂切矣他人或苟以藉口公發於至情如饑者之念食也顧勢有未可者耳觀與仲儀書論可退之節三至欲以得罪病而去君子之欲退其難如此可以為進者之戒作字要手熟則神氣完實而有餘於靜坐中自是一樂趙貧子謂人曰子神不全其人不服曰吾僚友萬乘螻蟻三軍糠粃富貴而晝夜死生何謂神不全乎貧子笑曰是血氣所扶名義所激非神之功也明日問其人曰子父母在乎曰亡久矣嘗夢見乎曰多矣夢中知其亡乎抑以為存也曰皆有之貧子曰父母之存亡不待計議而知者也晝日問子則不思而對夜夢見之則以亡為存死生之於夢覺有間矣物之眩子而難知者甚於父母之存亡子自以神全而不學可憂也哉予嘗與其語故錄之曹操既得志士人靡然歸之自文若盛徳猶為之經營謀慮一旦小異便為所殺程昱郭嘉之流固不足數也孔文舉竒逸博聞志大而才踈每所建輒中操病况肯為用乎然終亦不免桓溫謂孟嘉曰人不可無勢我乃能駕御卿即溫之才百倍於嘉所以云爾者自知其陰賊險狠不為高人勝士所比數爾管幼安懐寳遯世龍蟠海表其視曹操父子真穿窬斗筲而已終身不屈既不可得而用其可得而殺乎余以謂賢於文若文舉遠矣紹聖二年十二月與客飲醉甚歸坐雕堂西閣靣仆案上睡久之忽驚覺已三皷矣殘燭耿然偶取一冊書視之則幼安傳也㑹有所感不覺書此眼花手軟不復成字東坡志林卷十二
