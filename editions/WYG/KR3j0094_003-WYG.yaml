body:
  text: 東坡志林卷三宋蘓軾撰宋君奪民時以為臺而民非之無忠臣以掩其過也子罕釋相而為司空民非子罕而善其君齊桓公宫中七市女閭七百國人非之管仲所為三歸之臺以掩桓公此戰國策之言也蘇子曰管仲仁人也戰國策之言庶幾是乎然世未有以為然者也雖然管仲之愛其君亦陋矣不諫其過而務分謗焉或曰管仲不可諫也蘓子曰用之則行舎之則藏諫而不聼則不用而已矣故孔子曰管仲之器小哉善用兵者破敵國當如小兒毁齒以漸揺撼取之雖小痛而能堪也若不以漸一拔而得齒則取齒足以殺兒王翦以六十萬人取荆此一拔取齒之道也秦亦憊矣二世而敗坐此也夫左氏云管仲之世祀也宜哉謂其有禮也而管仲之後不復見於齊者余讀其書大扺以魚鹽富齊耳余然後知管子所以無後於齊者孔子曰微管仲吾其被髪左衽矣又曰如其仁夫以孔子稱其仁左丘明稱其有禮然不救其無後利不可與民争也如此桑𢎞羊滅族韋堅王鉷楊慎矜王涯之徒皆不免於禍孔循誅死有以也夫常病太史公言宰我與田常作亂夷其族使吾先師之門乃有叛臣焉而天下通祀者容叛臣其間豈非千載不蠲之惑也耶近令兒子邁考閲舊書究其所因則宰我不叛其驗明甚太史公固陋承疑使宰我負寃千載而吾先師與蒙其詬自兹一洗亦古今之快也蒍賈論子玉過三百乗而卻克自謂不如先大夫請八百乗將以用寡為勝抑將以多為賢也如淮隂侯言多多益善是用多亦不易古人以兵多敗者不可勝數如王尋符堅哥舒翰者多矣子玉剛而無禮少與之兵或能戒懼而可不敗耶晉恵帝為太子衛瓘欲陳啓廢立之䇿而未敢發㑹燕凌雲臺瓘託醉跪帝前曰臣欲有所啟欲言之而止者三因拊床曰此座可惜帝意乃悟曰公真大醉賈后由是怨之此何等語乃於衆中言之豈所謂不密失身者耶以瓘之智不宜暗此殆鄧艾之寃天奪其魄耳晉武帝欲為太子娶婦衛瓘曰賈氏有五不可青黑短妬而無子竟為羣臣所舉娶之竟以亡晉婦人黑白美惡人人知之而愛其子欲為娶婦且使多子者人人同也然至其惑於衆口則顛倒錯謬如此俚語曰證龜成鱉此未足怪也以此觀之當云證龜成蛇小人之移人也使龜蛇易位而况邪正之在其心利害之在歲月後者耶阮籍見張華鷦鷯賦歎曰此王佐才也觀其意獨欲自全於禍福之間耳何足為王佐乎華不從劉卞言竟與賈氏之禍畏八王之難而不免倫秀之虐此正求全之過失鷦鷯之本意桓溫之所成殆過於劉越石而區區慕之者英雄必自有所以相服初不以成敗言以此論之光武之度本不如𤣥徳唐文皇之英氣未必過劉寄奴也觀昌邑王與張敞語真清狂不慧者耳烏能為惡既廢則已矣何至誅其從官二百餘人以吾觀之其中從官必有謀光者光知之故立廢賀非專以淫亂故也二百人者方誅號呼於市曰當㫁不㫁反受其亂此其有謀明矣特其事秘史無縁得之著此者亦欲後人微見其意也武王數紂之罪孔子猶且疑之光等數賀之惡可盡信哉匈奴圍漢平城羣臣上言胡者全兵請令强弩傅兩矢外鄉徐行出圍孝竒注全兵云惟弓矢無雜仗也匈奴特無弩耳全兵者言匈奴自戰其地不致死不得與我行此危事也人君不得與臣下爭善同列爭善猶以為妬可以君父而妬臣子乎晉宋間人主至與臣下爭作詩寫字故鮑照多累句王僧䖍用拙筆以避禍悲夫一至於此哉漢文帝言乆不見賈生自以為過之今乃不及非獨無損於文帝乃所以為文帝之盛徳也而魏明乃不能堪遂作漢文勝賈生之論此非獨求勝其臣乃與異代之臣爭善豈惟無人君之度正如妬婦不獨禁忌其夫乃妬他人之妾也魏武帝既勝烏桓曰吾所以勝者幸也前諫我者萬全之計也乃賞諫者曰後勿難言袁紹既敗於官渡曰諸人聞吾敗必相哀惟田别駕不然當幸其言之中也乃殺豐為明主謀而忠不惟無罪乃有賞為庸主謀而忠賞固不可得而禍隨之乃知本初孟徳所以興亡者方與公謂周昌之吏趙堯年雖少竒士君必異之且代君昌笑曰堯刀筆吏爾何至是居頃之堯說髙祖為趙王置貴强相獨周昌為可髙祖用其䇿堯竟代昌為御史大夫吕后殺趙王昌亦無能為特謝病不朝爾由此觀之堯特為此計䂓代昌爾安能為髙祖謀哉吕后怨堯為此計亦抵堯罪非特不能為髙祖謀其自為謀亦不善矣昌謂之刀筆吏豈誣也哉荀卿云青出於藍而青於藍氷生於水而寒於水世之言弟子勝師者輙以此為口實此無異夢中語青即藍也氷即水也釀米為酒殺羊豕以為膳羞曰酒甘於米膳羞美於羊豕雖兒童必笑之而荀卿以是為辯信其醉夢顛倒之言以至論人之性皆此類也西漢風俗謟媚不為流俗所移唯汲長孺耳司馬遷至伉簡然作衛青傳不名但謂之大將軍賈誼何等人也而謂之愛幸於河南太守吳公此等語甚可鄙而遷不知習俗使然也本朝太宗時士大夫亦有此風至今未甚衰吾嘗發策學士院問兩漢所以亡者難易相反其意在此也而答者不能盡吾亦嘗於上前論之唐太宗時雉數飛集宫中上以問褚遂良良曰昔秦文公時童子化為雉雌鳴陳倉雄鳴南陽童子曰得雄者王得雌者霸文公遂雄諸侯光武得其雄起南陽有四海陛下本封秦故雌雄並見以告明徳上悦曰人不可以無學遂良所謂多識君子哉余以謂秦雉陳寳也豈常雉乎今見雉即謂之寳猶得白魚即自比武王此謟佞之甚愚瞽其君者而太宗喜之史不譏焉野鳥無故數入宫此正災異使魏徴在必以高宗鼎耳之祥諫也遂良非不知此捨鼎耳而取陳寳非忠臣也八蜡三代之戲禮也歲終聚戲此人情之所不免也因附以禮義亦曰不徒戲而已矣祭必有尸無尸曰奠始死之奠與釋奠是也今蜡謂之祭盖有尸也猫虎之尸誰當為之置鹿與女誰當為之非倡優而誰葛𢃄榛杖以喪老物黄冠草笠以尊野服皆戲之道也子貢觀蜡而不悅孔子譬之曰一弛一張文武之道盖為是也唐高祖起兵汾晋間時子建成元吉楚哀王智雲皆留河東䕶家高祖起兵乃密召之隋購之急建成元吉能間道赴太原智雲幼不能逃為吏所誅髙祖以父子之故不能少緩義師數日以須建成等至乎以此知為秦王所逼高祖逼於裴寂亂宫之事不暇復為三子性命計矣太宗本謀於是時借隋吏以殺兄弟其意明甚新舊史皆曲為太宗潤飾殺兄弟事然難以欺後世矣建成元吉之惡亦孔子所謂下流必歸歟吾先君友人史經臣彥輔豪偉人也嘗言黄霸本尚教化庶幾於富而教之者乃復用烏攫小數陋哉潁川鳳凰盖可疑也霸以鶡為神雀不知潁川之鳳以何物為之雖近於戲亦有理也李斯上書諫二世其略曰田常為簡公臣布恵施徳下得百姓上得羣臣隂取齊國殺宰予於庭是宰我不從田常為常所殺也弟子傳乃云宰我與田常作亂而滅其族孔子耻之李斯事荀卿去孔子不逺宜知其實弟子傳妄也曾子曰自吾母而不用吾情吾安所用其情故不情者君子之所甚惡也雖若孝弟者猶所不與以徳報怨行之美者也然孔子不取者以其不情也直不疑買金償亡不辯盗嫂亦士之高行矣然非人情其所以蒙詬受誣非不求名也求名之至也太史公窺見之故其贊曰塞侯微巧周文處謟君子譏之為其近於佞也不疑蒙垢以求名周文穢迹以求利均以為佞佞之為言智也太史公之論微世無曉者吾是以䟽之巢由不受堯禪堯舜不害為至徳夷齊不食周粟湯武不害為至仁故孔子不廢是說曰武盡美矣未盡善也揚雄者獨何人乃敢廢此曰允哲堯讓舜則不輕於由矣陋哉斯言使夷齊不經孔子雄亦且廢之矣世祖誠知揖遜之水尚汚牛腹則干戈之粟豈可溷夷齊之口乎於以知聖人以位為械以天下為牢庶乎其不驕士矣史記舜本紀舜歸而言帝請流共工於幽陵以變北狄放驩兠於崇山以變南蠻遷三苗於三危以變西戎殛鯀於羽山以變東夷太史公多見先秦古書故其言時有可考以證西漢以來儒者之失四族者若皆窮姦極惡則必誅於堯之世不待舜矣屈原云鯀悻直以亡身則鯀葢剛而犯上者耳若四族者皆小人也則安能以變四夷之族哉由此觀之四族之誅皆非誅死亦不廢棄但遷之逺方為要荒之君長爾如左氏之言皆後世流傳之過若堯世有大姦在朝而不能去則堯不足為尭矣漢仍秦法至重高恵固非虐主然習所見以為常不知其重也至孝文始罷肉刑與參夷之誅景帝復孥戮晁錯武帝罪戾有增無减宣帝治尚嚴因武之舊至王嘉為相始輕减法律遂至東京因而不改班固不記其事事見梁統傳固可謂踈略矣嘉賢相也輕刑又其盛徳之事可不記乎統乃言高恵文景以重法興哀平以輕法衰因上書乞增重法律頼當時不從其議此如人年少時不節酒色而安老後雖節而病見此便謂酒可以延年可乎統亦東京名臣一出此言遂獲罪於天其子松竦皆以非命而死冀卒滅族嗚呼悲夫戒哉踈而不漏可不懼乎張儀欺楚王以商於之地六百里既而曰臣有奉邑六里此與兒戲無異天下無不疾張子之詐而笑楚王之愚也夫六百里豈足道哉而張儀又非楚之臣為秦謀耳何足深過若後世之臣欺其君者曰行吾言天下舉安四夷畢服禮樂興而刑罰措其君之所欲得者非特六百里也而卒無絲毫之獲豈特無所獲䘮已不勝言矣則其所以事君者乃不如張儀之事楚因讀晁錯傳書此商君之法使民務本力農勇於公戰怯於私鬬食足兵强以成帝業然其民見刑而不見徳知利而不知義卒以此亡故帝秦者商君也亡秦者亦商君也其生有南靣之樂既足以報其帝秦之功矣而死有車裂之禍葢僅足以償其亡秦之罰理勢自然無足怪者後之君子有商君之罪而無其功享商君之福而未受其禍者吾為之懼矣元豐三年九月十五日讀戰國䇿書劉禹錫既敗為書自觧言王叔文實工言治道能以口辨移人既得用所施為人不以為當太上久疾宰相及用事者不得對宫掖事秘建桓立順功歸貴臣由是及貶後漢宦者傳論云孫程定立順之功曹騰參建桓之䇿與梁冀比舎清河而立蠡吾此漢之所以亡也與廣陵監國王豈可同年而語哉禹錫乃敢以為比以此知小人為姦雖已敗猶不悛也其可復置之要地乎因讀劉禹錫傳有所感書此東坡志林卷三
