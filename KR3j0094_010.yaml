body:
  text: 東坡志林卷十宋蘇軾撰至和二年成都人有費孝先者始來眉山云近往都城山訪老人村壞其一竹床孝先謝不敏且欲償其值老人笑曰子視其下字云此床以某年月日造至某年月日為費孝先所壞成壞自有數子何以償為孝先知其異乃留師事之老人授以易軌革卦影之術前此未知有此學者後五六年孝先以致富今死矣然四方治其學者所在而有皆自託於孝先真僞不可知也聊復記之使後人知卦影之所自也端午日未出於艾中以意求其似人者輒擷之以灸殊有效幼時見一書中云爾忘其為何書也艾未有真似人者於明暗間茍以意命之而已萬法皆妄無一真者復何疑耶司馬長卿始以汚行不齒於蜀人既而以詩賦得幸夭子未能有所建明亡絲毫之善以自贖也而創為西南夷逢君之惡以患苦其父母之邦乃復矜其車服節旄之美使邦君負弩先驅豈詩人致恭桑梓萬石君下里門之義乎聖人之所以能絶人者不可以常情疑其有無孔子為魯司冦墮郈費三桓不疑其害巳也非孔子能之乎伊尹去亳適夏既醜有夏復歸於亳伊尹為政於商既二於夏矣以桀之暴戾納其執政而不疑往來兩國之間而商人父師之非聖人能如是乎是以放太甲而不怨復其位太甲不疑不可以常情斷其有無也後世惟諸葛孔明近之𤣥德將死之言乃真實語也使孔明據劉禪位蜀人豈異詞哉元祐八年讀柳宗元伊尹五就桀贊終篇皆委伊尹往來兩國之間豈有意教誨桀而全其國耶不然湯之當王也久矣伊尹何疑焉桀能改過而免於誅可庶幾也能用伊尹而得志於天下雖至愚知其不然矣宗元意欲以此自解其從二王之罪也玉川子作月蝕詩云歲星主福德官爵奉董秦忍使黔婁生覆尸無衣巾詳味此詩則董秦當是無功而享厚祿者董秦李忠臣也天寶末驍將屢立戰功雖粗官亦頗知忠義代宗時吐畨犯闕徴兵忠臣即日赴難或勸擇日忠臣怒曰君父在難乃擇日耶後卒汚朱泚僞命誅考其終始非無功而享其厚祿者不知玉川何以有此句紹聖元年十月二十三日近讀六祖壇經指說法報化三身使人心開目明然尚少一喻試以眼喻見是法身能見是報身所見是化身何謂見是法身眼之見性非有非無無眼之人不免見黑眼枯睛亡見性不滅故云見是法身何謂能見是報身見性雖存眼根不具則不能見若能安養其根不為物障常使光明洞徹見性乃全故云能見是報身何謂所見是化身根性既全一彈指頃所見千萬縱橫變化俱是妙用故云所見是化身此喻既立三身愈明如此是否潞公坐客有言新義極迂怪者公笑不答久之曰頗嘗記明皇坐勤政樓上見釘校者上呼曰朕有一破損平天冠汝能釘校否此人既為完之上曰朕無用此冠以與汝為工直其人惶恐謝罪上曰俟夜深閉門後獨自戴甚無害也元祐八年八月十一日將朝尚蚤假寐夢歸縠行宅遍歷蔬圃中已而坐於南軒見莊客數人方運土塞小池土中得兩蘆蔔根客喜食之手取筆作一篇文有數句云坐於南軒對修竹數百野鳥數千既覺惘然懷思久之南軒先君名之曰來風者也近日頗多賊兩夜皆來入吾室吾近護魏王葬得數千緍略已散去此梁上君子當是不知耳導引家云心不離田手不離宅此語極有理又云真人之心如珠在淵衆人之心如泡在水此善譬喻者近時世人好蓄茶與墨閒暇輒出二物校勝負云茶以白為尚墨以黑為勝豫既不能校則以茶校墨以墨較茶未嘗不勝也真松煤遠煙馥然自有龍麝氣初不假二物也世之嗜者如滕達道蘇浩然吕行甫暇日晴暖研墨水數合弄筆之餘少啜飲之蔡君謨嗜茶老病不能復飲則把玩而已看茶而啜墨亦事之可笑者也慈湖陳氏草堂瀑流出兩山間落於堂後如懸布崩雪如風中雲如羣鶴舞參寥子問主人乞此地養老主人許之東坡居士投名作供養主龍丘子欲作庫頭參寥子不納云待汝一口吸盡此水令汝作浮玉老師元公欲為吾買田京口要與浮玉之田相近者此意殆不可忘吾昔有詩云江山如此不歸山山神見怪驚我頑我謝江神豈得已有田不歸如江水今有田矣不歸無乃食言於神也耶元豐七年二月一日東坡居士與徐得之參寥子步自雪堂並柯池入乾明寺觀竹林謁乳姥任氏墳鋤治茶圃遂造趙氏園探梅堂至尚氏第觀老枳偃蹇如龍蛇形憩定惠僧舍飲茶任公亭師中庵乃歸且約後日擕酒尋春於此溫嶠問郭文曰人皆有六親相容先生棄之何樂文曰本行學道不謂遭世亂欲歸無路耳又曰饑思食壯思室自然之理先生獨無情乎曰情由憶生不憶故無情又問先生獨處窮山死為烏鳶所食奈何曰埋藏者食於螻蟻復何異又問猛虎害人先生獨不畏耶曰人無害獸心則獸亦不害人又問世不寧則身不安先生不出濟世乎曰非野人之所知也豫嘗監錢塘郡遊餘杭九鎮山訪大滌洞天即郭生之舊隱洞天有巨壑深不可測蓋嘗有勑使投龍簡云戊寅九月七日東坡居士夜半録此顏回簞食瓢飲其為造物者費亦省矣然且不免於夭折使回更吃得兩簞食半瓢飲當更不活得二十九歲然造物者輒支盜跖兩日祿料足為回七十年糧矣但恐回不要耳世言竹紙可試墨誤矣當於不宜墨紙上竹紙蓋宜墨若池歙精白玉版乃真可試墨若於此紙黑無所不黑矣褪墨硯上研精白玉版上書凡墨皆敗矣元祐三年十二月二十一日駙馬都尉王晉卿致墨二十六丸凡十餘品豫雜研之作數十字以觀其色之淺深若果佳當搗合為一品亦當為佳墨豫昔在黃州鄰近四五郡皆送酒豫合置一器中為雪堂義尊今又當為雪堂義墨耶己卯臘月二十二日夜墨竈火大發幾焚屋救滅遂罷作墨得佳墨大小五百丸入漆者幾百丸足以了一世著書仍以遺所不知何人也餘松明一車留以照夜二十八日二鼓作此紙司馬溫公曰茶與墨正相反茶欲白墨欲黑茶欲重墨欲輕茶欲新墨欲陳豫曰二物之質誠然矣然亦有同者公曰何謂豫曰竒茶妙墨皆香是其德同也皆堅是其操同也譬如賢人君子妍醜黔晳之不同其德操蘊藏實無以異公笑以為是竇嬰田蚡俱好儒術推轂趙綰王臧迎魯申公欲設明堂令列侯就國除關以禮為服制欲以興太平㑹竇太后不悅綰臧下吏嬰蚡皆罷觀嬰蚡所為其名亦善矣然嬰既沾沾自喜蚡又專為姦利太平豈可以文致力成哉申公始不用穆生言為楚人所辱亦可以少懲矣晚又為嬰蚡起又可一笑鳳凰翔於千仞烏鳶彈射不去誠非虛語也漢時講堂今猶在畫故儼然丹青之古無復前比孔北海與曹公論盛孝章云孝章實丈夫之雄也游談之士假以成聲今以少年喜謗前輩或能譏評孝章孝章要為有天下重名九牧之人所共稱嘆吾讀之未嘗不廢書太息也嗟乎英偉竒逸之士不容於世俗也久矣雖然自今觀之孔北海盛孝章猶在而向之譏評者與草木同腐久矣昔吾舉進士試名於禮部歐陽文忠公見吾文曰此我輩人也吾當避之方是時士以剽裂為文聚而見訕訕公者所在成市曾不數年忽若潦水之歸壑無復見一人在此豈復待後世哉今吾衰老廢學自視缺然而天下之士不吾之棄以為可以與於斯文者猶以文忠公之故也張文潛秦少游此二人者士之超逸絶塵者非獨吾云爾二三子亦自以為莫及也士駭所未聞不能無異同故紛紛之論未嘗及吾與二子吾䇿之審矣士如良金美玉市有定價豈可以愛憎口舌賤貴之歟少游之弟少章復從吾游不及期年而議論日新若將施於用者欲歸省其親且不忍去嗚呼子行矣歸而求諸兄吾何加焉作太息一篇以餞其行使藏於家三年然後出之時雨降多置器廣庭中所得甘滑不可名以潑茶煮藥皆美而有益正爾食之不輟可以長生其次井泉甘冷者皆良藥也乾以九二化離坤以六二化坎故天一為水吾聞之道士人能服井花水者其熱與石硫黃鍾乳等非其人而服之亦能發背腦為疽蓋嘗觀之又分至日取井水儲之有方後七日輒生物如雲母故道士謂水中金可養鍊為丹此固嘗見之者此至淺近世獨不能為况所謂𤣥者乎詩人有寫物之功桑之未落其葉沃若他木殆不可以當此林逋梅花詩云踈影橫斜水清淺暗香浮動月黃昏决非桃李詩皮日休白蓮詩云無情有恨何人見月曉風清欲墜時决非紅蓮詩此乃寫物之功若石曼卿紅梅詩云認桃無緑葉辨杏有青枝此至陋語蓋村學究體也元祐三年十月十六日付過浮屠不三宿桑下東坡蓋三宿矣去後重修便當復念我耶庚辰八月二十四日合浦清樂軒書唐人煎茶用薑故薛能詩云鹽損添常戒薑宜煮更誇據此則又有用鹽者矣近世有用此二物者輒大笑之然茶之中等者若用薑煎信佳也鹽則不可司空表聖自論其詩以為得味外味緑樹連村暗黃花入麥稀此句最善又云棋聲花院閉幡影石壇高吾嘗獨遊五老峰入白鶴觀松陰滿地不見一人惟聞棋聲然後知此句之工也但恨其寒儉有僧態若杜子美云暗飛螢自照水宿鳥相呼四更山吐月殘夜水明樓則材力富健去表聖之流遠矣兒子邁幼嘗作林檎詩云熟顆無風時自脫半腮迎日鬭先紅於等輩中亦號有思致者余已老無他技但亦時出新句也嘗作酸棗詩云葉隨流水歸何處牛載寒鴉過别村此句亦可喜也陶靖節詩云平疇交遠風良苗亦懷新非古人之耦耕植杖者不能道此語非豫之世農亦不能識此語之妙也臨臯亭下八十餘步便是大江其半是峩眉雪水吾飲食沐浴皆取焉何必歸鄉哉江山風月本無常主閒者便是主人問范子豐新第園池與此孰勝所以不如君者上無兩稅及助役錢爾王夷甫既降石勒自解無罪且勸僭號其女惠風為愍懷太子妃劉曜陷洛以惠風賜其將喬屬將妻之惠風仗劒大罵而死乃知夷甫之死非獨慙見晉公卿乃當羞見其女也王敦至石崇家如厠脫故著新意色不怍厠中婢曰此客必能作賊也其婢能知人而崇乃令執事厠中殆是無所知也紹聖元年十月十二日與幼子過遊白水佛迹院浴於湯池熱甚其源殆可熟物循山而東少北有懸水百仭山八九折折處輒為潭深者磓石五丈不得其所止雪濺雷怒可喜可畏水涯有巨人蹟數十所謂佛蹟也暮歸倒行觀山燒火甚俯仰度數谷至江山月出擊汰中流掬弄珠璧到家二鼓復與過飲酒食餘甘煮菜顧影頽然不復甚寐書以付過東坡翁蘇臺定惠院淨人卓契順不逺數千里陟嶺渡海候無恙於東坡東坡問將什麼土物來順展兩手坡云可惜許數千里空手來順作荷擔勢信步而出曇秀來惠州見坡將去坡曰山中見公還必求一物何以與之秀曰鵝城清風鶴嶺明月人人送與只恐他無著處坡曰不如將幾紙字去每人與一紙但向道此是言法華書裏頭有灾福紹聖元年十月三日始至惠州寓於嘉祐寺松風亭杖屨所及雞犬相識明年遷於合江之行館在江樓豁徹之觀忘幽谷窈窕之趣未見其所休戚嶠南江北何以異也䖍州鶴田處士王原子直不遠千里訪豫於此留七十日而去東坡居士書石塔來别東坡坡云經過草草恨不一見石塔塔起立云遮著是磚浮圖耶坡云有縫塔塔云若無縫何以容世間螻蟻坡首肯之觀音經云呪詛諸毒藥所欲害身者念彼觀音力還著於本人東坡居士曰觀音慈悲者也今人遭呪詛念觀音之力而使還著於本人則豈觀音之心哉今改之曰呪詛諸毒藥所欲害身者念彼觀音力兩家總沒事東坡志林卷十
