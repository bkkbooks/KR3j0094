body:
  text: 東坡志林卷五宋蘇軾撰昨日子由寄老子新解讀之不盡卷而嘆使戰國時有此書則無商鞅韓非使漢初有此書則孔老為一晉宋間有此書則佛老不為二不意老年見此竒特元祐八年五月十日雍丘令米芾有書言縣有蟲食麥葉不食實適㑹金部郎中張元方見過云麥豆未嘗有蟲有蟲盖異事也既食其葉則實自病安有不為害之理元方因言子方蟲為害甚於蝗有小甲蟲見輙㫁其腰而去俗謂之旁不肯前此吾未嘗聞也故録之揚州芍藥為天下冠蔡繁卿為守始作萬花㑹用花十餘萬枝既殘諸園又吏因縁為姦民大病之余始至問民疾苦以此為首遂罷之萬花本洛陽故事亦必為民害也㑹當有罷之者錢惟演為留守始置驛貢洛花識者鄙之此宫妾愛君之意也蔡君謨始加法造小團茶貢之富彥國歎曰君謨乃為此耶近者余安道孫獻策榷饒州陶器自監榷得提舉死焉偶讀太平廣記貞元五年李白子伯禽為嘉興乍浦下塲雜鹽官侮慢廟神以死以此知不肖子代不乏人也昨日見泗倅陳敦固道言猢孫作人狀折旋俯仰中度細觀之其相侮慢也甚矣人言弄猢孫不知為猢孫所弄其言頗有理故為記之又見淮東提舉黄寔言見奉使髙麗人言所致贈作有假金銀錠夷人皆折壊使露胎素使者甚不樂夷云非敢慢也恐北人有覘者以為真耳由此觀之髙麗所得吾賜物北人盖分之矣而或者不察謂北人不知髙麗朝我或以為異時可使牽制北人豈不誤哉今日又見三佛齊來貢者過泗州官吏妓樂紛然郊外而椎髻獸靣睢盱船中遂記猢孫弄人語良有理故并記之王旟元龍言錢子飛有治大風方極驗常以施人一日夢人自云天使已以此病人君違天怒若施不已君當得此病藥不能救子飛懼遂不施予以為天之所病不可療耶則服藥不應有效藥有效者則是天不能病當是病之祟畏是藥而假天以禁人耳晉侯之病為二豎子李子豫赤丸亦先見於夢盖有或使之者子飛不察為鬼所脅若余則不然茍病者得愈願代受其苦家有一方能下腹中穢惡在黄州試之病良已今後當常以施人自省事以來聞世所謂道人有延年之術者如趙抱一徐登張元夢皆近百歲然竟死與常人無異及來黄州聞浮光有朱元經尤異公卿尊師之者甚衆然卒亦病死時中風搐搦但實能黄白有餘藥金皆入官不知世果無異人耶抑有之而人不見舉耶不知古所記人虚實無乃與此等不大相逺而好事者縁飾之耶退之詩曰百年未滿不得死且可勤買抛青春國史補云酒有郢之富春烏程之若下春滎陽之土窟春富平之石凍春劒南之燒春杜子美亦云聞道雲安麴米春才傾一盞便醺人裴鉶作傳竒記裴航事亦有酒名松醪春乃知唐人名酒多以春則抛青春亦是酒名也過太平州見郭祥正言嘗從章惇辟入梅山溪洞中說諭其首領見洞主蘓甘家有神畫像被服如士大夫事之甚嚴問之云此知桂府李大夫也問其名曰此豈可名哉叩頭稱死罪數四卒不敢名徐考其年月本末則李公師中誠之也誠之常為提刑權知桂府爾吾識誠之知其為一時豪傑也然小人多異議不知夷獠乃爾畏信之彼其利害不相及耳王介甫先封舒公後改封荆詩曰戎狄是膺荆舒是懲識者謂宰相不學之過也近世人輕以意改書鄙淺之人好惡多同故從而和之者衆遂使古書日就訛舛深可忿疾孔子曰吾猶及史之闕文也自予少時見前輩皆不敢輕改書故蜀本大字書皆善本蜀本莊子云用志不分乃疑於神此與易隂疑於陽禮使人疑汝於夫子同今四方本皆作凝陶潛詩採菊東籬下悠然見南山採菊之次偶然見山初不用意而境與意㑹故可喜也今皆作望南山杜子美云白鷗没浩蕩萬里誰能馴盖滅没於煙波間耳而宋敏求謂余云鷗不觧没改作波字二詩改此兩字便覺一篇神氣索然也把人馬正卿作太學正清苦有氣節學生既不喜博士亦忌之余偶至其齋中書杜子美秋雨嘆一篇壁上初無意也而正卿即日辭歸不復出至今白首窮餓守節如故正卿字夢得孫卿子書有韻語者其言鄙近多言成相莫曉其義前漢藝文志詩賦類中有成相雜詞十一篇則成相者盖古謳謠之名也疑所謂鄰有䘮舂不相及樂記云治亂以相訊也亦恐由此得名更當細考之王介甫多思而喜鑿時出一新說已而悟其非也則又出一說以觧之是以其學多說常與劉貢父食輟筯而問曰孔子不撤薑食何也貢父曰本草生薑多食損智道非明民将以愚之孔子以道教人者也故不撤薑食所以愚之也介甫欣然而笑乆之乃悟其戯已也貢父雖戱言然王氏之學實大類此庚辰三月十一日食薑粥甚美歎曰無恠吾愚吾食薑多矣因并貢父言記之以為後世君子一笑五臣注文選盖荒陋愚儒也今日偶讀嵇中散琴賦云間遼故音痺弦長故微鳴所謂痺者猶今俗云㪇聲也㪇音鮮出羯鼔録兩絃之間逺則有㪇故曰間遼絃鳴云者今之所謂泛聲也絃虚而不按乃可按故云絃長而微鳴也五臣皆不曉妄注又云廣陵止息東武太山飛龍鹿鳴鵾雞游弦中散作廣陵散一名止息此特一曲爾而注云八曲其他淺妄可笑者極多以其不足道故略之聊舉此使後之學者勿憑此愚儒也五臣既陋甚至於蕭統亦其流爾宋玉高唐神女賦自玉曰唯唯以前皆賦也而統謂之序大可笑也相如又首有子虛烏有亡是三人論難豈亦序耶其餘繆陋不一亦聊舉其一耳晉武帝探䇿豈亦如籖也耶恵帝不肖得一盖神以實告裴頠謟對士君子耻之而史以為美談鄙哉恵懐愍皆不終牛繫馬後豈及亡乎蕭子雲嘗答敕云臣皆不能賞拔隨時所貴規模子敬多歴年所年二十六著晉史至二王列傳欲作論草𨽻法言不盡意遂不能成略指論飛白一事而已十許年乃見勑㫖論書一卷商略筆狀洞徹字體始變子敬全法元常逮爾以來自覺功進此又見齊史本傳今閣下法帖十卷中乃有衞夫人與一僧書班班取子雲此文其偽妄可知也陸士衡與士龍書云登銅雀臺得曹公所藏石墨數甕今分寄一螺大業拾遺記宫人以蛾緑畵眉亦石墨之類也近世無復此物沈存中帥鄜延以石燭煙作墨堅重而黑在松煙之上曹公所藏豈此物也耶田單使人食必祭以致烏鳶又誤為神師皆近兒戱無益於事盖先以疑似置齊人心中則夜見火牛龍文足以駭動取一時之勝此其本意也眉州青神縣道側有小佛屋俗謂之猪母佛云百年前有牝猪伏於此化為泉有二鯉魚在泉中云盖猪龍也蜀人謂牝猪為母而立佛堂其上故以名之泉出石上深不及二寸大旱不竭而二鯉莫有見者余一日偶見之以告妻兄王愿愿深疑意余之誕也余亦不平其見疑因與愿禱於泉上曰余若不誕者果當復見已而二鯉復出愿大驚再拜謝罪而去此地應為靈異青神文及者以父病求毉夜過其側有髽而負琴者邀至室及辭以父病不可留而其人苦留之欲曉乃遣去行未數里見道傍有刼盜所殺人赫然未冷也否者及亦不免矣泉在石佛鎮南五里許去青神二十五里眉州人任達為余言少時見人家畜數百魚深池中㳂池磚甃四周皆屋舎環遶方文間凡三十餘年日加長一日天清無雷池中忽發大聲如風雨魚皆踴起羊角而上不知所徃達云舊說不以神守則為蛟龍所取此殆是爾余以謂蛟龍必因風雨疑此魚圏局三十餘年日有騰拔之念精誠不衰久而自達理自然爾吾昔為扶風從事歳大旱問父老境内可禱者云太白山至靈自昔有禱無不應近歲向傳師少師為守奏封山神為濟民侯自此禱不驗亦莫測其故吾方思之偶取唐㑹要看云天寳十四年方士上言太白山金星洞有寳符靈藥遣使取之而獲詔封山為靈應公吾然後知神之所以不悦者即告太守遣使禱之若應當奏乞復公爵且以瓶取水歸郡水未至風霧相纒旗旛飛舞彷彿若有所見遂大雨三日歲大熟吾作奏檢具言其狀詔封明應公吾復為記之且修其廟祀之日有白䑕長尺餘歴酒饌上嗅而不食父老云龍也是嵗嘉祐七年昨日讀隋書地里志黄州乃永安郡今黄州東十五里許有永安城而俗謂之女王城其說甚鄙野而圖經以為春申君故城亦非是春申君所都乃故吳國今無錫惠山上有春申君廟庶幾是乎昔吾先君夫人僦宅於眉之紗縠行一日二婢子熨帛足䧟於地視之深數尺有大甕覆以烏木板先夫人急命以土塞之甕中有物如人咳聲凡一年乃己人以為此有宿藏物欲出也夫人之姪之問者聞之欲發焉㑹吾遷居之問遂僦此宅掘丈餘不見甕所在其後某官於岐下所居大栁下雪方丈不積雪晴地墳起數寸某疑是古人藏丹藥處欲發之亡妻崇徳君曰使吾先姑在必不發也某愧而止眉之彭山進士有宋籌者與故叅知政事孫抃夢得同赴舉至華隂大雪天未明過華山下有牌堠云毛女峰者見一老姥坐堠下鬢如雪而無寒色時道上未有行者不知其所從來雪中亦無足迹孫與宋相去數百歩宋先過之亦恠其異而莫之顧孫獨留連與語有數百錢掛鞍盡以予之既追及宋道其事宋悔復徃求之已無所見是嵗孫第三人及第而宋老死無成此事蜀人多知之者蜀人單驤者舉進士不第顧以毉聞其術雖本於難經素問而别出新意徃徃巧發竒中然未能十全也仁宗皇帝不豫詔孫兆與驤入侍有間賞賚不貲已而大漸二子皆坐誅頼皇太后仁聖察其非罪坐廢數年今驤為朝官而兆已死矣予來黄州鄰邑人龎安常者亦以毉聞其術大類驤而加以鍼術妙絶然患聾自不能愈而愈人之病如神此古人所以寄論於目睫也耶驤安常皆不以賄謝為急又頗博物通古今此所以過人也元豐五年三月余偶患左手腫安常一鍼而愈聊為記之歐陽文忠公嘗言少時有僧相我耳白於靣名滿天下唇不著齒無事得謗其言頗驗耳白於靣則衆所共見唇不著齒余亦不敢問公不知其何如也今日見提舉陳貽叔云舒州有醫人李惟熈者為人清妙善論物理云菱芡皆水物菱寒而芡暖者菱開花背日芡開花向日故也又云桃杏花雙仁輙殺人者其花本五出六出必雙舊說草木花皆五出惟梔子與雪花六出此殆隂陽之理今桃杏六出雙仁皆殺人者失常故也木石之蠧者必不沙爛沙爛者必不蠧而能浮不浮者亦殺人余嘗考其理既沙爛散則不能蘊蓄而生蟲瓜至甘而不蠧者以其沙也此雖末事亦理有不可欺者富彥國在青社河北大饑民爭歸之有夫婦襁負一子未幾廹於饑困不能皆全棄之道左空塜中而去歲定還鄉過此塜欲收其骨則兒尚活肥健愈於未棄時見父母匍匐來就視塜中空無有惟有一竅滑易如蛇䑕出入有大蟾蜍如車輪氣咻咻然出穴中意兒在塜中常呼吸此氣故能不食而健自爾遂不食年六七歲肌理如玉其父抱兒來京師以示小兒毉張荆筐張曰物之有氣者能蟄燕蛇蝦之類是也能蟄則能不食不食則夀此千載蝦蟆也法不當與藥若聴其不食不娶長必得道父喜擕去今不知所在張與余言盖嘉祐六年也石普好殺人以殺為娛未嘗知其暫悔也醉中縛一奴使其指使投之於河指使哀而縱之既醒而悔指使畏其暴不敢以實告居久之普病見奴為祟自以必死指使呼奴示之祟不復出普亦愈元豐六年十二月二十七日天欲明夢數吏人持紙一幅其上題云請祭春牛文予取筆疾書其上云三陽既至庶草將興爰出土牛以戒農事衣被丹青之好本出泥塗成毁須臾之間誰為喜慍吏微笑曰此兩句復當有怒者旁一吏云不妨此是唤醒他近聞黄州小民貧者生子多不舉初生便於水盆中浸殺之江南尤甚聞之不忍㑹故人朱壽昌康叔守鄂州某以書遺之乃立賞罰以變此風而黄之士石耕道雖椎魯無他長然頗誠實喜為善乃使率黄人之富者嵗出十千如願過此者亦聼使耕道掌之多買米布絹絮使安國寺僧繼連書其出入訪閭里田野有貧甚不舉子者輙少遺之若嵗活得百箇小兒亦閒居一樂事也吾雖貧亦當出十千東坡志林卷五
