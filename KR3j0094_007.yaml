body:
  text: 東坡志林卷七宋蘇軾撰三十年餘家國數千里地山河幾曾慣干戈一旦歸為臣虜沈腰潘鬢消磨最是倉惶辭廟日教坊猶奏别離歌揮淚對宫娥後主既為樊若水所賣舉國與人故當慟哭於九廟之外謝其民而後行顧乃揮淚宫娥聼教坊離曲跋陳後主詞僕責居黃州鄭元輿君乘亦官於黃一日以此紙一軸求僕字云有故人孟訪者酷好君書囑我為求之仍出孟君書數紙其人亦自善用筆灑然雖僕何以加之鄭君言其意勤甚殆不可阻後數日適會中秋僕與客飲酒江亭上醉甚乃為此數字時元豐四年也明日視之紙乃絹也然古者本為絹紙近世失之君乘簡中云孟倅之子本謂河陽倅也而僕誤以為姓鄭也子瞻雖醉甚亦是川若藞鮓故態視絹為紙以鄭為孟適當子瞻看朱成碧時耳此公胸中落落决不至如劉儀同訪同舍見其子猶不悟也某倅武林日夢神宗召入禁中宫女圍侍一紅衣女童捧紅靴一隻命某銘之覺而記其一聯云寒女之絲銖積寸纍天步所臨雲蒸雷起既畢進御上極歎其敏使宫女送出睇視裙𢃄間有六言詩一首云百疊漪漪風皺六銖縱縱雲輕植立含風廣殿微聞環珮搖聲豫嘗夢客有擕詩相過者覺而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣又有數句若銘贊者云道之所以成不害其耕德之所以修不賊其牛元祐六年十一月十九日五更夢數人論左傳云祈招之詩固善諷然未見所以感切穆王之心已其車轍馬迹之意者有答者曰以民力從王事當如飲酒適於饑飽之度而已若過於醉飽則民不堪命王不獲沒矣覺而念其言似有理故録之吾昔在錢塘一日晝寢寶山僧舍起題其壁云七尺頑軀走世塵十圍便腹貯天真此中空洞渾無物何止容君數百人其後有數小子亦題名壁上見者乃謂豫誚之也周伯仁所謂君者乃王茂𢎞之流豈此等輩哉世子多諱蓋僭者也吾嘗作李太白真贊云生平不識高將軍手汚吾足乃敢嗔吾今復書此者欲使後之小人少知自揆也與次公同聼賢師琴賢求詩倉卒無以應之次公言古人賦詩皆歌所學何必已云次公因誦歐陽公贈李師詩囑豫書之以贈焉元祐四年九月二十一日東坡居士記唐雷氏琴自開元至開成間世有人然其子孫漸志於利追世好而失家法故以最古者為佳非貴逺而賤近也豫家有一琴其中銘云開元十年造雅州靈關村雷家記八日合未曉八日合為何等語也廬山處士崔成老彈之以為絶倫云元豐六年十月初四日書元祐五年十二月一日遊小靈隱聽林道人論琴棋極有妙語豫雖不通此伎然以理度之知其言足信也杜子美論畫云更覺良工心獨苦用意之妙有舉世莫知之者此其所以獨苦也王中令既平蜀捕逐餘冦與步隊相逺飢甚入一村寺中一僧醉甚箕踞公怒欲斬之僧應對不懼公竒而赦之問求蔬食僧云有肉無蔬公益竒之餽以一蒸猪頭食之甚美公喜問僧止能飲酒食肉耶抑有他技也僧自言能詩公令賦蒸豚援筆立成詩云嘴長毛短淺含臕久向山中食藥苗蒸處已將蕉葉裹熟時更用杏漿澆紅鮮雅稱金盤飣軟熟真堪玉筯挑若把羶根來比並羶根只合喫藤條公大喜與紫衣豫舊過陳州留七十餘日近城可遊觀者無不至柳湖旁有丘俗謂之鐵墓云陳胡公墓也城濠水往嚙其址見有鐵錮之又有寺曰厄臺云孔子厄於陳蔡所居者其說荒唐不可信或曰東漢陳思王寵散弩臺以控扼黃巾者此說為近之數年前朝廷作汴河斗門以淤田議者皆以為不可竟為之然卒亦無功方樊山水盛時放斗門則河田墳墓廬舍皆被害及秋深水退而放則淤不能厚謂之蒸餅淤朝廷亦厭之而罷偶讀白居易甲乙判有云得轉運使以汴河水淺不通運請築塞兩河斗門節度使以當管營田悉在河次在斗門築塞無以供軍乃知唐時汴河兩岸皆有營田斗門若遇水不乏即可沃灌古有之而不能何也當更問知者元豐三年冬至過山陽登西閣時景繁出巡未歸某方乞歸常州得請春中方當復過此故有閣欲名思之未有佳者蔡謨廓名父子也晉宋間第一流輒以仰公名不知可否䖍州布衣賴仙芝言連州有黃損僕射者五代時人僕射蓋仕南漢也未老退歸一日忽遁去莫知其所存亡子孫畫像事之凡三十二年復歸坐阼階上呼家人其子適不在孫出見之索筆書壁云一别人間嵗月多歸來人事已消磨惟有門前鑑池水春風不改舊時波投筆竟去不可留子歸問其狀貌孫云甚似影堂老人也連人相傳如此其後頗有祿仕者章察字隱之本閩人遷於成都數世矣善屬文不仕晚用太守王素薦賜號冲退處士一日夢有人寄書召之者云東嶽道士書也明日與李士寧遊青城濯足水中察謂士寧曰腳踏西溪流去水士寧答曰手持東嶽寄來書察大驚不知其所自來也未幾察果死其子祀亦以逸民舉仕一命乃死士寧蓬州人也語默不常或以為得道者百歲乃死常見豫成都曰子甚貴當䇿舉首已而果然韓縝為秦州酷暴少恩以賊殺不辜去官秦人語曰寧逢暴虎不逢韓玉汝玉汝縝字也孫臨最喜滑稽尤善對或問曰莫逢韓玉汝當以何對臨應聲曰可怕李金吾天下以為口實七言之偉麗者杜子美云旌旗日暖龍蛇動宫殿風微燕雀髙五更鼓角聲悲壯三峽星河影動搖爾後寂寥無聞焉直至歐陽永叔蒼波萬古流不盡白鶴雙飛意自閒萬馬不嘶聽號令諸番無事樂耕耘可以並驅爭先矣小生亦云令嚴鐘鼓三更月野宿貔貅萬竈烟又云露布朝馳玉關塞捷書夜到甘泉宫亦庶幾焉耳世人見古有見桃花而悟道者爭頌桃花便將桃花作飯五十年轉沒交涉正如張長史見擔夫與公主爭道而得草書之氣欲學長史書便日就擔夫求之豈可得哉俗傳書生入官庫見錢不識或怪而問之生曰固知其為錢但怪其不在紙裹中耳豫偶讀歸去來辭云幼稚盈室瓶無儲粟乃知俗傳信而有徴使瓶有儲粟亦甚微矣此翁平生只於瓶中見粟也耶馬后紀夫人見大練乃以為異物晉惠帝問餓民何不食肉糜細思之皆一理也聊為好事者一笑永叔嘗言孟郊詩鬢邉雖有絲不堪織寒衣就使堪織能得多少陶潛詩採菊東籬下悠然見南山採菊之次偶然見山初不用意而景與意會故可喜也今皆作望南山杜子美云白鷗沒浩蕩萬里誰能馴蓋滅沒於烟波間耳而宋敏求謂豫云鷗不解沒改作波字二詩改此兩字覺一篇神氣索然也秋菊有佳色裛露掇其英泛此忘憂物遠我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴笑傲東軒下聊復得此生靖節以無事自適為得此生則見役於物者非失此生耶淵明飲酒詩云客養千金軀臨化消其寶寶不過軀軀化則寶亡矣人言靖節不知道吾不信也歐陽文忠公言晉無文章唯陶淵明歸去來兮一篇而已豫亦謂唐無文章唯韓退之送李願歸盤谷序一篇而已平生欲效此作一文每執筆輒罷因自笑曰不若且放教退之獨步徐寅唐末號能賦謁朱全忠誤犯其諱全忠色變寅狼狽走出未及門全忠呼知客將責以不先告語斬於界石南寅欲遁去恐不得脫乃作過太原賦以獻其略曰千金漢將感精魄以神交一眼胡奴望英風而膽落全忠大喜遺絹五百匹全忠自言夢見淮陰使受兵法一眼胡奴指李克用也寅雖免一時之禍殊不憂一眼胡奴見此賦也可笑詩云榖則異室死則同穴古今之葬者皆為一室獨蜀人為同墳而異葬其間為通道高不及眉廣不能容人生者之室謂之壽堂以偶人被甲執戈謂之夀神以守之而以石甓塞其通道既死而葬則去之某先夫人之葬也先君為夀室追為先人墓志故其文曰蜀人之祔也同壠而異壙君實謙以為已之文不敢與歐陽公同藏也東漢夀張樊恭侯遺令棺柩一藏不宜復見如有腐敗傷孝子之心使與夫人異藏光武善之書以示百官蓋古亦有是也然不為通道又非詩人同穴之義故蜀人之葬最為得禮也宋書樂志宋文帝元嘉十三年給彭城王義康伎相丞給三十六人太常傅隆以為左傳諸侯用六杜預以為三十六人非是舞所以節八音故必以八人為列自天子至士降殺以兩兩者减其二列爾若如預言至士止有四人豈復成樂服䖍注左傳與隆同又春秋晉悼公納鄭女樂二八晉以一八賜魏絳此樂以八人為列也豫按說文佾從人䏌聲䏌許吃切䏌從肉口入聲其解云振也八無緣為䏌之聲疑古文從人從肉舊傳陽關三疊然今世歌者每句再疊而已若通一首言之又是四疊皆非是或每句三唱已應三疊之說則叢然無復節奏余在密州有文勛長官以事至密自云得古本陽關其聲宛轉凄斷不類乃知唐本三疊蓋如此及在黃州偶得樂天對酒云相逢且莫推辭醉聽唱陽關第四聲注云第四聲勸君更盡一杯酒以此驗之若一句再疊則此句為第五聲今為第四聲則一句不疊審矣世有附語者多婢妾賤人否則衰病不久當死者也其聲音舉止皆類死者又能知人密事然皆非也意有竒鬼能為是耶昔人有逺行者欲觀其妻於已厚薄取金叉藏之壁中忘以語之既行而病且死以告其僕既而不死忽聞空中有聲其其夫也曰吾已死以為不信金叉在某處妻取得之遂發喪其後夫歸妻乃反以為鬼也嘗有三老人相遇或問之年一人曰吾年不可記但憶少年時與盤古有舊一人曰海水變桑田時吾輒下一籌爾來吾籌已滿十間屋一人曰吾所食蟠桃棄其核於崑崙山之下今已與崑崙齊矣以豫觀之三子者與蜉蝣朝菌何以異哉元豐六年十月十二日夜故人有得風疾者急往視之已不能言矣方死生之爭其苦有甚於刀鋸木索者矣豫知其不可救默為祈死而已嗚呼哀哉此復何罪乎酒色之娛而已古人云甘嗜毒藥戲猛獸之爪牙豈虛言哉明日見一少年以此戒之少年笑曰甚矣子言之陋也色吾之所甚好而死生疾苦非吾之所怖也豫曰有行乞於道偃而號曰遺我一盂飯吾今以千斛之粟報子則市人皆掩口笑之有千斛之粟無一盂之飯不可以欺於小兒怖生於愛子能不怖死生而猶好色其可以欺我哉今世之為高者皆少年之徒也戒生定定生慧此不刋之語也如其不從戒定生者皆妄也如慧而實癡也如覺而實夢也悲夫東坡志林卷七
