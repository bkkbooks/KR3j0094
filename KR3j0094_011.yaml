body:
  text: 東坡志林卷十一宋蘇軾撰僕嘗問荔枝何所似或曰荔枝似龍眼坐客皆笑其陋荔枝實無所似也僕云荔枝似江瑤柱應者皆憮然僕亦不辨昨日見畢仲遊問杜甫似何人仲遊曰似司馬遷僕喜而不答蓋與曩言會也眉山矮道士李伯祥好為詩詩格亦不能高往往有竒語如夜過修竹寺醉打老僧門之句皆可愛也豫幼時嘗學於道士張簡易觀中伯祥與簡易往來嘗見豫嘆曰此郎君貴人也不知其何以知之鄭君先輩知其俊敏篤學向觀所為詩文非止科場手段也人去忙作書不及相見且致此意李公弼亦再三傳語蒙許遠訪何幸如之海州窮獨見人即喜况君佳士乎林行婆當健有香與之到日使去也八郎房下不幸傷悼有二措大相與言志一云我平生不足惟飯與睡耳他日得志當吃飽飯了便睡睡了又吃飯一云我則異於是當喫了又喫何暇復睡耶吾來廬山聞馬道士嗜睡於睡中得妙然吾觀之終不及彼措大得喫飯三昧也今世真玉至少雖金鐵不可近須沙碾而後成者以為真玉矣然猶未也特珉之精者真玉須定州磁芒所不能傷者乃是嘗問後苑老玉工亦莫知其信否伊尹云德惟一動罔不吉德二三動罔不凶貧賤人但有常德非復富貴即當得道雖當大富貴苟無常德其後必敗豫以此占之多矣孟子曰形色天性也惟聖人然後可以踐形中雖不然猶知強之於外此所以為天性也十六及第當以鳳咮風字大研與之請文甫收此為據十六及第却當以天祿石猊為僕作利市川紙取布頭機餘經不受緯者治作之故名布頭箋此紙冠天下六合人亦作終不及爾飲官法酒烹團茶燒衙香用諸葛筆皆北歸嘉事也契嵩禪師常瞋人未嘗見其笑海月慧禪師常喜人未嘗見其怒豫在錢塘親見二人皆趺坐而化嵩既茶毗火不能壞益薪熾火有終能不壞者五海月比葬靣如生且微笑乃知二人以瞋喜作佛事也世人視身如金玉不旋踵為糞土至人反是豫以是知一切法以愛故壞以捨故常在豈不然哉豫遷嶺南始識南華重辨長老語終日知其有道也豫自嶺南還則辨已寂久矣過南華弔其衆問塔墓所在曰我師昔有夀塔在南華之東數里有不悅師者葬之别墓既七百餘日矣今長老明公獨奮不顧發而歸之壽塔改棺易衣舉體如生衣皆鮮芳衆乃大服東坡居士曰辨視身為何物棄之尸陀林以飼烏鳶何有安以壽塔為明公知辨者特欲以化服同異而已乃以茗果奠其塔而書其事以遺其上足南華塔主可興師時元符三年十一月十九日紹聖元年九月二十六日東坡居士遷於惠州艤舟泊頭鎮明晨肩輿十五里實二十里至羅浮山入延祥寶積寺禮天竺瑞像飲梁僧景秦禪師卓錫泉品其味出江水上遠甚東三里至長壽觀又東北三里至沖虛觀觀葛稚川丹竈次之詣仙者朝斗壇觀壇上有獲銅龍六魚一壇北有洞曰朱明榛莽不可入水出洞中鏘鳴如琴築水中皆菖蒲生石上道士鄧守安字道立有道者也訪之適出山坐遺履軒望麻姑峰方飲憩進士許毅來遊呼與飲既醉還宿寶積閣中夜大風曉壯甚有聲晨粥已還舟憩華光寺從遊者幼子過巡檢史玉寶積長老齊德延祥長老紹沖沖虛道人陳熙山中可遊而未暇者明福宫石樓黃龍洞期以明年三月復來紹聖三年八月六日夜雨風旦視東西有巨人迹五是月某日眉山蘇某與男過來觀耳如芭蕉心如蓮花百節疏通萬竅玲瓏來時一去時八萬四千此義出楞嚴世未有知之者也元符三年九月二十一日書贈都嶠邵道士李衛公言唐儉輩不足惜觀其容貌殆非所謂名下無虛士唐初即用隋樂武德九年始詔祖孝孫竇璡等定樂初隋用黃鍾宫惟擊七鐘其五鐘懸而不擊謂之啞鐘張文收乃依古斷竹為十二律與孝孫等吹調扣之而應由是十二鐘皆用其肅宗時山東人魏延陵得律一因李輔國奏之云大常樂調皆下不合黃鍾請悉更製諸鐘磬帝以為然乃悉取諸樂器磨刻之二十五日而成然以常律考之黃鍾太簇也當時議者以為是唐自肅宗以後政日急民日困俗日偷以至於亡以理推之所謂下者乃中聲也悲夫此道以老聃佛語兼修之常自念此身猶如稿木竪一作堅老定不動若復動搖一毫髮許即墮大地獄如孫武令商君法有死無犯鄭大士所得輒與老夫不謀而同乃知前生俱是一會中人也妙總師參寥子豫友二十餘年矣世所知獨其詩文所不知者蓋過於詩文也獨好靣折人過失然人知其無心如虛舟之觸物蓋未嘗有怒者徑山長老維琳行峻而通文麗而清始徑山祖師有約後世止以甲乙住持豫謂以適事之宜而廢祖師之約當於山門選用有德乃以琳嗣事衆初有不悅其人然終不能勝悅者之多且公也今則大定矣杭州圓照律師志行苦卓教法通洽晝夜行道二十餘年矣無一念頃有作相自辨才歸寂道俗皆宗之秀州本覺寺一長老少蓋有名進士自文字言語悟入至今以筆研作佛事所與遊皆一時文人淨慈楚明長老自越州來始有旨召小本禪師住法雲寺杭人憂之曰本去則淨慈衆散矣豫乃以明嗣事衆不散加多益千餘人蘇州仲殊師利和尚能文善詩及歌詞皆操筆立成不點竄一字豫曰此僧胸中無一毫髮事故與之遊蘇州定慧長老守欽豫初不識比至惠州欽使侍者卓契順來問豫安否且寄十詩豫題其後曰此僧清逸絶俗語有璨忍之通而詩無島可之寒豫往來吳久矣而不識此僧何也下天竺淨慧禪師思義學行甚髙綜練世事髙麗非時遣僧來豫方請其事於朝使義館之義日與講佛法詞辨蜂起夷僧莫能制又具得其情以告蓋其才有過人者孤山思聰聞復師作詩清遠如畫工而雄逸愛放而不流其為人稱其詩祥符寺可久垂雲清順三闍黎皆豫監郡日所與往還詩友也清介貧甚食僅足於久幾而不足也然未嘗有憂色老矣不知尚健否法穎沙彌參寥子之法孫也七八歲事師如成人上元夜豫作樂滅慧頴坐一夫肩上觀之豫謂曰出家兒亦看燈耶穎愀然變色若無所容啼呼求去自爾不復出嬉遊今六七年矣後當嗣參寥者豫在惠州有永嘉羅漢院僧惠誠來謁曰明日當還浙東問所欲幹者豫無以答之獨念吳越多名僧與豫善者常十九偶録此數人以授惠誠使歸見之致豫意且為道豫居此起居飲食狀以解其念也信筆書紙語無倫次又當尚有漏落者方醉不能詳也紹聖二年三月二十三日東坡居士書東坡志林卷十一
