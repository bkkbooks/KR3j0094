body:
  text: 東坡志林卷一宋蘇軾撰僕嘗夢見人云是杜子美謂僕曰世人多誤解吾詩八陳圖詩云江流石不轉遺恨失吞吳人皆以為先主武侯皆欲與關羽復讐故恨其不能滅吳非也我本意謂吳蜀唇齒之國不當相圖晉之所以能取蜀者以蜀有吞吳之意此為恨耳此理甚長然子美死凡四百年而猶不忘詩區區自别其意此真書生習氣耶韓退之青龍寺詩終篇言赤色莫曉其故嘗見小説鄭虔寓青龍寺貧無紙取柿葉書九月柿葉赤而實紅則退之詩乃謂此也退之詩云我生之辰月宿直斗乃知退之磨蝎為身宫而僕乃以磨蝎為命平生多得謗譽殆是同病也石介作三豪詩其略云曼卿豪於詩永叔豪於文而杜默師雄豪於歌也永叔亦贈默詩云贈之三豪篇而我濫一名默之歌少見於世初不知之後聞其一篇云學海波中老龍聖人門前大蟲皆此等語甚矣介之無識也永叔不欲嘲笑之者此公惡爭名且為介諱也吾觀杜默豪氣正是京東學究飲私酒食瘴死牛肉醉飽後所發者也作詩狂怪至盧同馬異極矣若更求竒便作杜默矣昨日太守楊君采通判張公規邀余出遊安國寺坐中論風氣養生之事余云皆不足道難在去欲張云蘇子卿齧雪啖氊縮背出血無一語少屈可謂了死生之際矣然不免為胡婦生子窮居海上而况洞房綺縠之下乎乃知此事不易消除衆客皆大笑余愛其語有理故記之唐末五代文章衰盡詩有貫休齊已書有亞棲村俗之氣大率相似如蘇子美家收張長史書云隔簾歌已俊對坐貌彌精語既近凡而字無法真亞棲之流近見曾子固編李太白集後謂頗獲遺亡而有贈懷素草書歌并笑矣乎數首皆貫休齊已辭格二人皆號有知識者故深可怪如白樂天贈徐凝退之贈賈島之類皆世俗無知者所託此不足多怪元祐元年余為中書舍人時執政患本省事多漏泄欲於舍人廳後作露籬禁同省往來余白諸公應須簡要清通何必栽籬插棘諸公笑而止明年竟作之暇日讀樂天集有云西省北院新構小亭種竹開窗東通騎省與李常侍窗下飲酒作詩乃知唐時得西掖作窗以通東省而今日本省不得往來可嘆也舟中讀文選恨其編次無法去取失當齊梁文章衰陋而蕭統尤為卑弱文選序斯可見矣如李陵書蘇武五言皆偽而不能辨今觀淵明集可喜者甚多而獨取數首以知其餘人忽遺者多矣淵明作間情賦所謂國風好色而不淫正使不及周南與屈宋所陳何異而統大譏之此乃小兒強作解事者李善注文選本末詳備極可喜所謂五臣者真俚儒之荒陋者也而世以為勝善亦謬矣謝瞻張子房詩云苛慝暴三殤此禮所謂上中下殤言暴秦無道戮及孥稚也而乃引苛政猛於暴虎吾父吾子吾夫皆死於是謂夫與父為殤此豈非俚儒之荒陋者乎諸如此類甚多不足言故不言也玉川子作月蝕詩以謂蝕月者月中之蝦蟆也梅聖俞作日蝕詩云食日者三足烏也此固俚説以寓其意也然戰國策曰日月輝於外其賊在於內則俚説亦尚矣余在岐下見秦州進一馬騣如牛頷下垂胡側立倒項毛生肉端番人云此肉騣馬也乃知鄧公驄馬行云肉騣碨礧連錢動當作肉騣悲陳陶云四萬義軍同日死此房琯之敗也唐書作陳濤抑不知孰是時琯臨敗猶欲持重以有所伺而中人邢延恩促戰遂大敗故次篇悲青坂云焉得附書與我軍留待明年莫倉卒又北征詩云桓桓陳將軍杖鉞奮忠烈此謂陳元禮也元禮佐玄宗平內難又從幸蜀首建誅國忠之策洗兵馬行云張公一生江海客身長九尺須眉蒼此張鎬也明皇雖誅蕭至忠然常懷之侯君集云蹭蹬至此至忠亦蹭蹬者耶故子美亦哀之云赫赫蕭京兆今為時所憐及出塞云我今良家子出師亦多門將驕益愁思身貴不足論躍馬三十年恐辜明主恩坐見幽州騎長驅河洛昏中夜間道歸故里但空村惡名幸脫兔投老無兒孫詳味此詩蓋祿山反時其將校有脫身歸國而祿山盡殺其妻子者不知其姓名可恨也故人董傳善論詩嘗云杜子美詩不免有凡語已知仙客意相親更覺良工心獨苦豈非凡語耶余笑曰此句殆為君發凡人用意深處人罕能識此所以為獨苦豈獨畫哉憶昔詩云關中小兒壞紀綱謂李輔國也張后不樂上為忙謂肅宗張皇后也為留猛士守未央謂子儀奪兵柄入宿衛也子美自許契與稷人未必許也然其詩云舜舉十六相身尊道何髙秦時用商鞅法令如牛毛此自是契稷輩人口中語也又云知名未足稱局促商山芝又云王侯與螻蟻同盡隨丘墟願聞第一義回向心地初乃知子美詩外别有事在也樂天為王涯所讒謫江州司馬甘露之禍樂天在洛適遊香山寺有詩云當君白首同歸日是我青山獨往時不知者以樂天為幸之樂天豈幸人之禍者哉蓋悲之也劉子玄辨文選所載李陵與蘇武書非西漢文蓋齊梁間文士擬作者也吾因悟陵與蘇武贈答五言亦後人所擬今日讀列女傳蔡琰二詩其詞明白感慨頗類世所傳木蘭花詩東京無此格也建安七子猶含飬圭角不盡發見况伯喈女乎又琰之流離為在父沒之後董卓既誅伯喈方遇禍今此詩乃云為董卓所驅虜入胡中尤知其非真也蓋擬作者疏略而范煜荒淺遂載之本傳可以一笑也栁子厚詩云盛時一失貴反賤桃笙葵扇安可常不知桃笙為何物偶閲方言簟宋魏之間謂之笙乃悟桃笙以桃竹為簟也梁簡文答南王獻書云五離九拆出桃枝之翠笋乃謂桃枝竹簟也桃竹出巴渝間杜子美有桃竹杖引元豐七年十二月浴泗州雍熙塔下戲作如夢兩闋云水垢何曾相受細看兩俱無有寄語揩背人盡日勞君揮肘輕手輕手居士本來無垢又云自淨方能洗彼我自汗流呀氣寄語澡浴人且共肉身遊戲但洗但洗擺脫世間一切此曲本唐莊宗製一名憶仙姿嫌其不雅馴後改云如夢莊宗作此詞卒章云如夢如夢和淚出門相送取以為之名舊讀子美六和寺詩云松橋待金鯽竟日獨遲留初不喻此語及倅錢塘乃知寺後池中有此魚如金色昨日復遊池上投餅餌久之乃略出不食復入不可復見自子美作詩至今四百餘年已有遲留之語則此魚自珍貴蓋久矣茍非難進易退而不妄食安得如此壽耶冦元弼言去歲春徐州通判李陶有子年十七八素不善作詩忽詠落花詩云流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香父驚問之若有物憑附者自云是謝中舍問砑光帽事云西王母宴羣仙有舞者𢃄砑光帽帽上簪花舞香山一曲曲未終花皆落去孔壁汲冢竹簡科斗皆漆書也終於蠧壞景鐘石鼓蓋堅古人之為不朽之計亦至矣然其妙意所以不墜者特以人傳人耳大哉人乎易曰神而明之存乎其人吾作易書傳論語説亦粗備矣嗚呼又何以多為漢武諱巫蠱之事疾之如仇讐蓋夫婦君臣父子之間嗷嗷然不聊生矣然史記封禪書云丁夫人雒陽虞初等以方祠詛胸奴大宛已且為巫蠱之魁何以責其下此最可笑云陶靖節云倚南窗以寄傲審容膝之易安故常欲作小軒以容安名之劉聰聞當為須遮國王則不復懼死人之愛富貴有甚於生者月犯少微吳中高士求死不得人之好名有甚於生者今年吾當詣廣陵暫與子由相别至廣陵逾月遂往南郡自南郡詣梓州泝流歸鄉盡載家書而行迤邐致仕築室種果於眉以須子由之歸而老焉不知此願遂否言之悵然也韓魏公在中山狄青為副總管陳薦為幕客今魏公之子師朴出鎮而青之子詠薦之子厚復踐此職亦異事也九江陳輔之有於陵仲子之操不娶無子曰我罪人也東坡曰有猶子乎曰有東坡曰魯山道州乃前比也輔之一笑曰賴古多此賢陶彭澤不解事忍飢作此詩意古賢能飽人輔之今為丹陽南郭人朱氏子出家小名照僧少喪父與其母尹皆願出家照僧師守素乃參寥弟子也照僧九歲舉止如成人誦余赤壁賦鏗然鸞鶴聲也不出十年名聞四方此參寥之法孫東坡門僧也柳公權論研甚貴青州石末云墨易冷世莫曉其語此研青州甚易得凡物爾無足珍者蓋出陶竈中無潤澤理唐人以此作羯鼓鞚與定州花瓷作對豈研材乎研當用石鏡當用銅此其材本性也以瓦為研如使鐵鏡耳人之待瓦研鐵鏡也微而責之也輕粗能磨墨照影便稱竒物其實豈可與真材本性者同日而語哉蘄州龎君安常善醫而聵與人語須書始能曉東坡笑曰吾與君皆異人也吾以手為口君以眼為耳非異人乎孔子為魯司冦七日而誅少正卯或以為太速此叟蓋自知頭方命薄必不久在相位故汲汲及其未去發之使更遲疑三兩日已為少正卯所圖矣張睢陽生猶罵賊嚼齒穿齦顔平原死不忘君握拳透掌郗嘉賔既死出其所與桓溫密謀之書一篋囑其門生曰若家君眠食大減即出此書方回見之曰是兒死已晚矣乃不復念余讀而悲之曰士之所甚好者名也而愛莫加於父子嘉賔以父之故而不匿其惡名方回以君之故而不念其子嘉賔可謂孝子方回可謂忠臣也悲夫或曰嘉賔與桓溫謀畔而子以孝子稱之可乎曰采葑采菲無以下體嘉賔之不忠不待誅絶而明者其孝可廢乎王述之子坦之欲以女與桓溫述怒排坦之曰汝真癡耶乃欲以女與兵坦之是以不與溫之禍使郗氏父子能如此吾無間然矣子由之達蓋自幼而然方先君與某篤好書畫每有所獲真以為樂唯子由觀之漠然不甚經意今日有先見固宜也吾無求於世矣所須二頃田以足饘粥耳而所至訪問終不可得豈吾道方艱難無適而可耶抑人生自有定分雖一飽亦如功名富貴不可輕得也范蜀公呼我卜鄰許下許下多公卿而我蓑衣箬笠放浪於東坡之上豈復能事公卿哉若人久放浪不覺有病或然持飬百病皆作如州縣久不治因循茍簡亦曰無事忽遇能吏百弊紛然非數月不能清淨也要且堅忍不退所謂一勞永逸也泗洲大聖僧伽傳云和尚何國人也又云世莫知其所從來云不知何國人也近讀陌史西域傳乃有何國余在惠州忽被命責儋耳太守方子容自擕告身來且弔余曰此固前定可無恨吾妻沈素事僧伽謹甚一夕夢和尚告别沈問所往答云當與蘇子瞻同往後七十二日當有命今適七十二日矣豈非前定乎余以為事之前定者不待夢而知然余何人也而和尚辱與同行得非夙世有少緣契乎東坡志林卷一
